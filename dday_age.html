<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 D-Day & 만 나이 통합 계산기</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
        .calc-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .dday-card { border-left: 5px solid #6366f1; }
        .age-card { border-left: 5px solid #ec4899; margin-bottom: 0; }
        
        h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dday-card h3 { color: #6366f1; }
        .age-card h3 { color: #ec4899; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .input-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        label {
            font-size: 14px;
            color: #475569;
            font-weight: 600;
            white-space: nowrap;
        }
        input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            color: #1e293b;
            outline: none;
            background: white;
            box-sizing: border-box;
        }
        input[type="date"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .age-card input[type="date"]:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        .result-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            text-align: center;
            min-height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .dday-huge {
            font-size: 28px;
            font-weight: 800;
            color: #4f46e5;
        }
        .age-huge {
            font-size: 24px;
            font-weight: 800;
            color: #db2777;
        }
        .sub-info {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>📅 D-Day & 만 나이 계산기</h2>

    <div class="calc-card dday-card">
        <h3>🎯 1. 디데이 & 기념일 계산</h3>
        <div class="input-group">
            <div class="input-item">
                <label>목표 날짜 선택</label>
                <input type="date" id="targetDate" onchange="calcDDay()">
            </div>
        </div>
        <div class="result-box" id="ddayResult">
            <span style="color:#94a3b8;">날짜를 선택하면 디데이가 계산됩니다.</span>
        </div>
    </div>

    <div class="calc-card age-card">
        <h3>🎂 2. 행정 표준 '만 나이' 계산</h3>
        <div class="input-group">
            <div class="input-item">
                <label>생년월일 입력</label>
                <input type="date" id="birthDate" onchange="calcAge()">
            </div>
            <div class="input-item">
                <label>기준일 (기본:오늘)</label>
                <input type="date" id="baseDate" onchange="calcAge()">
            </div>
        </div>
        <div class="result-box" id="ageResult">
            <span style="color:#94a3b8;">생년월일을 입력하면 만 나이가 계산됩니다.</span>
        </div>
    </div>
</div>

<script>
    // 페이지 로드 시 기본 날짜 세팅 (오늘 날짜)
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('baseDate').value = todayStr;
    
    // 예시 디데이로 한 달 뒤 세팅
    const nextMonth = new Date();
    nextMonth.setMonth(nextMonth.getMonth() + 1);
    document.getElementById('targetDate').value = nextMonth.toISOString().split('T')[0];

    // 1. D-Day 계산 함수
    function calcDDay() {
        const targetInput = document.getElementById('targetDate').value;
        const resultDiv = document.getElementById('ddayResult');
        
        if (!targetInput) return;

        const today = new Date();
        const target = new Date(targetInput);

        // 시, 분, 초 초기화하여 날짜 편차 제거
        today.setHours(0,0,0,0);
        target.setHours(0,0,0,0);

        const diffTime = target - today;
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) {
            resultDiv.innerHTML = `<span class="dday-huge">D-Day</span><div class="sub-info">🎉 드디어 바로 오늘입니다!</div>`;
        } else if (diffDays > 0) {
            resultDiv.innerHTML = `<span class="dday-huge">D - ${diffDays}</span><div class="sub-info">앞으로 ${diffDays}일 남았습니다.</div>`;
        } else {
            // 지나간 날짜 (보통 커플 기념일은 만난 날을 1일로 치므로 +1을 해주는 옵션이 대중적)
            const passedDays = Math.abs(diffDays) + 1;
            resultDiv.innerHTML = `<span class="dday-huge">D + ${Math.abs(diffDays)}</span><div class="sub-info">🗓️ 날짜가 지난 지 ${Math.abs(diffDays)}일째 (기념일 기준 ${passedDays}일차)</div>`;
        }
    }

    // 2. 만 나이 계산 함수 (대한민국 표준 법령 반영)
    function calcAge() {
        const birthInput = document.getElementById('birthDate').value;
        const baseInput = document.getElementById('baseDate').value;
        const resultDiv = document.getElementById('ageResult');

        if (!birthInput || !baseInput) return;

        const birth = new Date(birthInput);
        const base = new Date(baseInput);

        let age = base.getFullYear() - birth.getFullYear();
        const monthDiff = base.getMonth() - birth.getMonth();
        const dayDiff = base.getDate() - birth.getDate();

        // 생일이 안 지난 경우 만 나이에서 1살을 뺌
        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
            age--;
        }

        // 태어난 해보다 기준일이 과거일 때 예외 처리
        if (age < 0) {
            resultDiv.innerHTML = `<span style="color:#ef4444; font-weight:bold;">기준일이 생년월일보다 빠릅니다!</span>`;
            return;
        }

        // 연도별 띠 계산 (자축인묘진사오미신유술해)
        const zodiac = ["원숭이(신)", "닭(유)", "개(술)", "돼지(해)", "쥐(자)", "소(축)", "호랑이(인)", "토끼(묘)", "용(진)", "뱀(사)", "말(오)", "양(미)"];
        const birthYear = birth.getFullYear();
        const myZodiac = zodiac[birthYear % 12];

        resultDiv.innerHTML = `
            <span class="age-huge">만 ${age}세</span>
            <div class="sub-info"> 💡 ${birthYear}년생 (${myZodiac}띠) 기준일 현재 생일 <b>${(monthDiff > 0 || (monthDiff === 0 && dayDiff >= 0)) ? '지남' : '안 지남'}</b></div>
        `;
    }

    // 초기 실행
    calcDDay();
</script>

</body>
</html>
