<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직장인 부업 종합소득세 계산기</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 22px;
            letter-spacing: -0.5px;
        }
        .calc-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 16px;
        }
        .input-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-item label {
            font-size: 14px;
            color: #475569;
            font-weight: 600;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            text-align: right;
            box-sizing: border-box;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        .unit {
            position: absolute;
            right: 12px;
            font-size: 14px;
            color: #94a3b8;
            pointer-events: none;
        }
        .result-box {
            background: #f0f9ff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            color: #1e293b;
            line-height: 1.7;
            border: 1px solid #bae6fd;
        }
        .highlight {
            font-weight: bold;
            color: #0284c7;
            font-size: 22px;
        }
        .breakdown {
            font-size: 13px;
            color: #475569;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e1;
        }
        .info-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            line-height: 1.4;
            background: rgba(0,0,0,0.02);
            padding: 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>N잡러를 위한 직장인 부업 종합소득세 계산기</h2>

    <div class="calc-section">
        <div class="grid-inputs">
            <div class="input-item">
                <label>본업 연봉 (세전 총급여)</label>
                <div class="input-wrapper">
                    <input type="number" id="mainSalary" placeholder="50000000" value="50000000" oninput="calcTotalTax()">
                    <span class="unit">원</span>
                </div>
            </div>

            <div class="input-item">
                <label>부업 소득 종류 선택</label>
                <select id="subType" onchange="calcTotalTax()">
                    <option value="3.3">프리랜서 / N잡 (3.3% 원천징수 수입)</option>
                    <option value="etc">기타소득 (애드포스트, 원고료 등)</option>
                </select>
            </div>

            <div class="input-item">
                <label>부업 연간 총 수입액 (세전)</label>
                <div class="input-wrapper">
                    <input type="number" id="subIncome" placeholder="10000000" value="10000000" oninput="calcTotalTax()">
                    <span class="unit">원</span>
                </div>
            </div>
        </div>

        <div class="result-box" id="taxResult">
            금액을 입력하시면 5월 종합소득세 합산 추정치가 실시간 계산됩니다.
        </div>
    </div>
</div>

<script>
    function formatNum(num) {
        return Math.round(num).toLocaleString('ko-KR');
    }

    function calcTotalTax() {
        const mainSalary = parseFloat(document.getElementById('mainSalary').value) || 0;
        const subIncome = parseFloat(document.getElementById('subIncome').value) || 0;
        const subType = document.getElementById('subType').value;
        const resultDiv = document.getElementById('taxResult');

        if (mainSalary <= 0 && subIncome <= 0) {
            resultDiv.innerHTML = "금액을 입력하시면 실시간 결과가 계산됩니다.";
            return;
        }

        // 1. 근로소득금액 대략적 모의 계산 (근로소득공제 단순화 반영)
        let mainDed = mainSalary * 0.15; 
        if(mainSalary <= 45000000) mainDed = mainSalary * 0.20;
        let mainIncomeAmount = mainSalary - mainDed;
        if(mainIncomeAmount < 0) mainIncomeAmount = 0;

        // 2. 부업 소득금액 계산 (단순경비율 대략 60% 가정 적용)
        let subIncomeAmount = subIncome * 0.4; 
        if(subType === 'etc') {
            subIncomeAmount = subIncome * 0.4;
        }

        // 3. 과세표준 합산 (기본공제 및 표준공제 단순화 적용)
        const baseDeduction = 4500000; 
        let taxBase = (mainIncomeAmount + subIncomeAmount) - baseDeduction;
        if(taxBase < 0) taxBase = 0;

        // 4. 소득세율 적용 누진세 산출
        let estimatedTax = 0;
        if (taxBase <= 14000000) {
            estimatedTax = taxBase * 0.06;
        } else if (taxBase <= 50000000) {
            estimatedTax = 14000000 * 0.06 + (taxBase - 14000000) * 0.15;
        } else if (taxBase <= 88000000) {
            estimatedTax = 14000000 * 0.06 + 36000000 * 0.15 + (taxBase - 50000000) * 0.24;
        } else {
            estimatedTax = 14000000 * 0.06 + 36000000 * 0.15 + 38000000 * 0.24 + (taxBase - 88000000) * 0.35;
        }

        // 본업에서 이미 낸 대략적 기납부세액 차감 유추
        let mainTaxBase = mainIncomeAmount - baseDeduction;
        if(mainTaxBase < 0) mainTaxBase = 0;
        let mainPaidTax = 0;
        if (mainTaxBase <= 14000000) mainPaidTax = mainTaxBase * 0.06;
        else if (mainTaxBase <= 50000000) mainPaidTax = 14000000 * 0.06 + (mainTaxBase - 14000000) * 0.15;
        else mainPaidTax = 14000000 * 0.06 + 36000000 * 0.15 + (mainTaxBase - 50000000) * 0.24;

        // 부업 원천징수 기납부세액 계산
        let subPaidTax = 0;
        if(subType === '3.3') {
            subPaidTax = subIncome * 0.03; 
        } else {
            subPaidTax = subIncome * 0.08; 
        }

        // 최종 추가 납부 혹은 환급 세액 (소득세 + 지방세 10%)
        let finalNationalTax = estimatedTax - mainPaidTax - subPaidTax;
        let finalLocalTax = finalNationalTax * 0.1;
        let totalFinalPay = finalNationalTax + finalLocalTax;

        let resultType = "💰 5월 예상 추가 납부액:";
        if(totalFinalPay < 0) {
            resultType = "💵 5월 예상 환급액:";
            totalFinalPay = Math.abs(totalFinalPay);
        }

        resultDiv.innerHTML = `
            🎯 ${resultType} <span class="highlight">${formatNum(totalFinalPay)}원</span>
            <div class="info-text">※ 본업 연봉과 부업 소득이 합산되면서 세율 구간이 상승(누진세)할 수 있으므로, 5월 종합소득세 신고 시 조정될 수 있는 대략적인 시뮬레이션입니다.</div>
            
            <div class="breakdown">
                • <b>합산 추정 과세표준:</b> 약 ${formatNum(taxBase)}원<br>
                • <b>부업으로 인해 증가된 종합소득세:</b> 약 ${formatNum(finalNationalTax)}원<br>
                • <b>지방소득세 (10%):</b> 약 ${formatNum(finalLocalTax)}원
            </div>
        `;
    }
    calcTotalTax();
</script>

</body>
</html>
