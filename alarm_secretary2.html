<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>온라인 알림 반복 알람 시계 사이트</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; background: #e2e8f0; }
        .tab-btn.active { background: #ec4899; color: white; }
        .page { display: none; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .page.active { display: block; }
        .flash { background: #ff9f9f !important; }
        .timer-display { font-size: 70px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        button { padding: 15px 25px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; color: white; background: #ec4899; }
        .sample-btn { background: #64748b; padding: 8px 15px; font-size: 14px; margin: 3px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showPage('timer', this)">⏰ 만능 알림 타이머</button>
        <button class="tab-btn" onclick="showPage('dash', this)">📋 알림 비서 대시보드</button>
    </div>

    <div id="timer" class="page active">
        <h2 id="statusTitle">⏰ 만능 알림 타이머</h2>
        <div class="timer-display" id="timeDisplay">00:00</div>
        <div>
            <button class="sample-btn" onclick="addTime(10)">+10초</button>
            <button class="sample-btn" onclick="addTime(30)">+30초</button>
            <button class="sample-btn" onclick="addTime(60)">+1분</button>
            <button class="sample-btn" onclick="addTime(300)">+5분</button>
        </div>
        <br>
        <button id="startBtn" onclick="startTimer()">🚀 타이머 시작</button>
        <button id="stopBtn" onclick="stopAlarm()" style="display:none; background:#334155;">🛑 알람 끄기</button>
    </div>

    <div id="dash" class="page">
        <h2>📋 알림 비서 대시보드</h2>
        <input type="text" id="alarmName" placeholder="알림 내용" style="width:80%; padding:10px;"><br><br>
        <input type="time" id="alarmTime" style="width:80%; padding:10px;"><br><br>
        <button onclick="addAlarm()">+ 알림 등록</button>
        <div id="alarmList" style="margin-top:20px; text-align:left;"></div>
    </div>

    <script>
        let timeLeft = 0, timerId = null;
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        function addTime(seconds) {
            timeLeft += seconds;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timeDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function startTimer() {
            if (timeLeft <= 0) return alert("시간을 먼저 추가해주세요!");
            if (timerId) clearInterval(timerId);
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "inline-block";
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) { clearInterval(timerId); triggerAlarm(); }
            }, 1000);
        }

        function triggerAlarm() {
            audio.play();
            document.getElementById('statusTitle').innerText = "⏰ 완료!";
            window.flashInterval = setInterval(() => document.body.classList.toggle('flash'), 500);
        }

        function stopAlarm() {
            clearInterval(timerId);
            clearInterval(window.flashInterval);
            audio.pause(); audio.currentTime = 0;
            document.body.classList.remove('flash');
            document.getElementById('statusTitle').innerText = "⏰ 만능 알림 타이머";
            document.getElementById('startBtn').style.display = "inline-block";
            document.getElementById('stopBtn').style.display = "none";
            timeLeft = 0;
            updateDisplay();
        }

        function addAlarm() {
            const name = document.getElementById('alarmName').value;
            const time = document.getElementById('alarmTime').value;
            if(!name || !time) return alert("내용과 시간을 입력해주세요!");
            const div = document.createElement('div');
            div.className = "alarm-item";
            div.dataset.time = time;
            div.innerHTML = `<p style="border-bottom:1px solid #eee; padding:10px;">🔔 <b>${name}</b> - ${time} <button onclick="this.parentElement.remove()" style="background:red; padding:2px 5px; float:right;">삭제</button></p>`;
            document.getElementById('alarmList').appendChild(div);
        }

        setInterval(() => {
            const now = new Date();
            const nowTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.querySelectorAll('.alarm-item').forEach(item => {
                if (item.dataset.time === nowTime && !item.classList.contains('fired')) {
                    triggerAlarm();
                    item.classList.add('fired');
                    alert("🔔 알림 시간입니다!");
                }
            });
        }, 1000);
    </script>
</body>
</html>
