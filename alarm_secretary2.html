<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>만능 알림 비서 서비스</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; background: #e2e8f0; }
        .tab-btn.active { background: #ec4899; color: white; }
        .page { display: none; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .page.active { display: block; }
        .flash { background: #ff9f9f !important; }
        .timer-display { font-size: 70px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        input { padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; margin: 5px; width: 60px; }
        button { padding: 15px 25px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; color: white; background: #ec4899; }
        .sample-btn { background: #64748b; padding: 8px 15px; font-size: 14px; margin: 3px; }
        /* 알람 끄기 버튼 공통 스타일 */
        #stopBtn { background:#334155; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- 모든 페이지 상단에 배치되는 알람 끄기 버튼 -->
    <button id="stopBtn" onclick="stopAlarm()" style="display:none;">🛑 알람 끄기</button>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showPage('timer', this)">⏰ 짧은 시간용 타이머</button>
        <button class="tab-btn" onclick="showPage('dash', this)">📋 긴 시간용 대시보드</button>
    </div>

    <!-- 타이머 탭 -->
    <div id="timer" class="page active">
        <h2 id="statusTitle">⏰ 짧은 시간용 타이머</h2>
        <div class="timer-display" id="timeDisplay">00:00</div>
        <div>
            <input type="number" id="minInput" placeholder="분">
            <input type="number" id="secInput" placeholder="초">
            <button onclick="addInputTime()" style="background:#ec4899; padding:10px 15px;">설정</button>
        </div>
        <div style="margin-top:15px;">
            <button class="sample-btn" onclick="addTime(10)">+10초</button>
            <button class="sample-btn" onclick="addTime(60)">+1분</button>
            <button class="sample-btn" onclick="addTime(600)">+10분</button>
        </div>
        <br><br>
        <button id="startBtn" onclick="startTimer()">🚀 타이머 시작</button>
    </div>

    <!-- 대시보드 탭 -->
    <div id="dash" class="page">
        <h2>📋 긴 시간용 대시보드</h2>
        <input type="text" id="alarmName" placeholder="알림 내용" style="width:80%; padding:10px;"><br><br>
        <input type="time" id="alarmTime" style="width:80%; padding:10px;"><br><br>
        <div style="margin-bottom:15px;">
            <button class="sample-btn" onclick="setPresetTime(30)">+30분</button>
            <button class="sample-btn" onclick="setPresetTime(60)">+1시간</button>
            <button class="sample-btn" onclick="setPresetTime(180)">+3시간</button>
            <button class="sample-btn" onclick="setPresetTime(300)">+5시간</button>
        </div>
        <button onclick="addAlarm()">+ 예약 알림 등록</button>
        <div id="alarmList" style="margin-top:20px; text-align:left;"></div>
    </div>

    <script>
        let timeLeft = 0, timerId = null;
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        function addInputTime() {
            timeLeft += (parseInt(document.getElementById('minInput').value) || 0) * 60 + (parseInt(document.getElementById('secInput').value) || 0);
            updateDisplay();
        }

        function addTime(seconds) { timeLeft += seconds; updateDisplay(); }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timeDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function startTimer() {
            if (timeLeft <= 0) return alert("시간을 설정하세요!");
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "inline-block";
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) { clearInterval(timerId); triggerAlarm(); }
            }, 1000);
        }

        // 오디오 객체는 전역에서 관리합니다.
const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
audio.loop = true; // 소리 반복 설정

function triggerAlarm() {
    audio.play().catch(e => console.log("자동 재생 정책으로 인해 재생이 차단되었습니다."));
    document.getElementById('stopBtn').style.display = "inline-block";
    window.flashInterval = setInterval(() => document.body.classList.toggle('flash'), 500);
}

function stopAlarm() {
    // 1. 오디오 재생 정지 및 시간 초기화
    audio.pause();
    audio.currentTime = 0;
    
    // 2. 루프 해제 (혹시 모를 상황 대비)
    audio.loop = false;
    audio.loop = true; // 다시 원상복구

    // 3. 깜빡임 및 타이머 정리
    clearInterval(timerId);
    clearInterval(window.flashInterval);
    document.body.classList.remove('flash');
    
    // 4. UI 정리
    document.getElementById('stopBtn').style.display = "none";
    document.getElementById('startBtn').style.display = "inline-block";
    
    // 5. 알람 상태 초기화
    timeLeft = 0;
    updateDisplay();
    document.querySelectorAll('.alarm-item').forEach(item => item.classList.remove('fired'));
}

        function addAlarm() {
            const name = document.getElementById('alarmName').value;
            const time = document.getElementById('alarmTime').value;
            if(!name || !time) return alert("내용과 시간을 입력하세요!");
            const div = document.createElement('div');
            div.className = "alarm-item";
            div.dataset.time = time;
            div.dataset.name = name;
            div.innerHTML = `<p style="border-bottom:1px solid #eee; padding:10px;">🔔 <b>${name}</b> - ${time} <button onclick="this.parentElement.remove()" style="background:red; padding:2px 5px; float:right;">삭제</button></p>`;
            document.getElementById('alarmList').appendChild(div);
        }

        function setPresetTime(m) {
            const now = new Date(); now.setMinutes(now.getMinutes() + m);
            document.getElementById('alarmTime').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        setInterval(() => {
            const now = new Date();
            const nowTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.querySelectorAll('.alarm-item').forEach(item => {
                if (item.dataset.time === nowTime && !item.classList.contains('fired')) {
                    item.classList.add('fired');
                    triggerAlarm();
                    alert("🔔 알림 시간입니다: " + item.dataset.name);
                }
            });
        }, 1000);
    </script>
</body>
</html>
