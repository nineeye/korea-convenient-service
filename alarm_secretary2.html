<div id="dash" class="page">
        <h2>📋 긴 시간용 대시보드</h2>
        <input type="text" id="alarmName" placeholder="알림 내용" style="width:80%; padding:10px;"><br><br>
        <input type="time" id="alarmTime" style="width:80%; padding:10px;"><br><br>
        
        <div style="margin-bottom:15px;">
            <button class="sample-btn" onclick="setPresetTime(30)">+30분</button>
            <button class="sample-btn" onclick="setPresetTime(60)">+1시간</button>
            <button class="sample-btn" onclick="setPresetTime(180)">+3시간</button>
            <button class="sample-btn" onclick="setPresetTime(300)">+5시간</button>
        </div>
        
        <button onclick="addAlarm()">+ 예약 알림 등록</button>
        <div id="alarmList" style="margin-top:20px; text-align:left;"></div>
    </div>

    <script>
        // ... (위쪽 코드는 동일) ...

        // [추가된 로직] 현재 시간에서 특정 분을 더해 input에 입력
        function setPresetTime(minutesToAdd) {
            const now = new Date();
            now.setMinutes(now.getMinutes() + minutesToAdd);
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('alarmTime').value = `${hours}:${minutes}`;
        }
        
        // ... (나머지 코드 동일) ...
    </script>
