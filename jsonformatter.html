<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 포맷터 및 뷰어</title>
    <style>
        /* 기본 리셋 및 폰트 설정 (이전 도구들과 통일감 유지) */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 800px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; margin-bottom: 20px; font-size: 24px; }

        /* 상태 메시지 (에러 표시용) */
        #statusMsg {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none; /* 기본적으로 숨김 */
        }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }

        /* 텍스트 입력창 (코드를 다루므로 고정폭 폰트 적용) */
        textarea { 
            width: 100%; 
            height: 300px; 
            padding: 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-family: 'Courier New', Courier, monospace; /* 코드용 폰트 */
            font-size: 14px; 
            line-height: 1.5;
            resize: vertical; 
            margin-bottom: 20px; 
            transition: border-color 0.3s ease;
            background-color: #fafbfc;
            white-space: pre; /* 줄바꿈 유지 */
            overflow-wrap: normal;
            overflow-x: auto; /* 가로 스크롤 허용 */
        }
        textarea:focus { 
            outline: none; 
            border-color: #3498db; 
            background-color: #ffffff;
        }
        
        /* 버튼 영역 */
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        button { 
            flex: 1; 
            min-width: 110px;
            padding: 12px 15px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            transition: all 0.2s ease; 
        }
        button:active { transform: scale(0.98); }
        
        .btn-blue { background: #3498db; color: white; }
        .btn-blue:hover { background: #2980b9; }
        .btn-dark { background: #34495e; color: white; }
        .btn-dark:hover { background: #2c3e50; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-green:hover { background: #27ae60; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-red:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="container">
        <h2>JSON 포맷터 (정렬 및 압축)</h2>
        
        <div id="statusMsg"></div>

        <textarea id="jsonInput" placeholder="여기에 정렬되지 않은 JSON 데이터를 붙여넣으세요...&#10;&#10;예시:&#10;{&quot;name&quot;:&quot;John&quot;,&quot;age&quot;:30,&quot;city&quot;:&quot;New York&quot;}"></textarea>

        <div class="buttons">
            <button class="btn-blue" onclick="formatJSON()">예쁘게 정렬</button>
            <button class="btn-dark" onclick="minifyJSON()">한 줄로 압축</button>
            <button class="btn-green" onclick="copyResult()">결과 복사</button>
            <button class="btn-red" onclick="clearAll()">지우기</button>
        </div>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const statusMsg = document.getElementById('statusMsg');

        // 상태 메시지를 띄우는 함수 (성공 또는 에러)
        function showStatus(message, isError = false) {
            statusMsg.style.display = 'block';
            statusMsg.innerText = message;
            if (isError) {
                statusMsg.className = 'error';
            } else {
                statusMsg.className = 'success';
                // 성공 메시지는 3초 뒤에 사라지게 함
                setTimeout(() => {
                    statusMsg.style.display = 'none';
                }, 3000);
            }
        }

        // 예쁘게 정렬하기 (Beautify)
        function formatJSON() {
            const rawData = jsonInput.value.trim();
            if (!rawData) return;

            try {
                // 문자를 JSON 객체로 변환 (여기서 문법이 틀리면 에러 발생)
                const parsedData = JSON.parse(rawData);
                // 객체를 다시 문자로 변환하되, 들여쓰기 4칸 적용
                jsonInput.value = JSON.stringify(parsedData, null, 4);
                showStatus('✅ JSON이 성공적으로 정렬되었습니다.');
            } catch (error) {
                // 에러가 발생하면 원인을 보여줌
                showStatus('❌ 유효하지 않은 JSON 형식입니다: ' + error.message, true);
            }
        }

        // 한 줄로 압축하기 (Minify)
        function minifyJSON() {
            const rawData = jsonInput.value.trim();
            if (!rawData) return;

            try {
                const parsedData = JSON.parse(rawData);
                // 띄어쓰기나 줄바꿈 없이 한 줄로 묶기
                jsonInput.value = JSON.stringify(parsedData);
                showStatus('✅ JSON이 성공적으로 압축되었습니다.');
            } catch (error) {
                showStatus('❌ 유효하지 않은 JSON 형식입니다: ' + error.message, true);
            }
        }

        // 결과 복사 기능
        function copyResult() {
            const text = jsonInput.value;
            if (text.trim() === '') {
                alert('복사할 데이터가 없습니다.');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                showStatus('📋 결과가 클립보드에 복사되었습니다.');
            }).catch(err => {
                alert('복사에 실패했습니다: ' + err);
            });
        }

        // 전체 지우기
        function clearAll() {
            jsonInput.value = '';
            statusMsg.style.display = 'none';
            jsonInput.focus();
        }
    </script>

</body>
</html>
