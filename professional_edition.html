<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심층 심리 분석 시스템</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0b0e14; color: #e2e8f0; display: flex; justify-content: center; padding: 50px 20px; }
        .container { background: #181c25; padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid #2d3748; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #3d4756; background: #0b0e14; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #2563eb; }
        #loading { display: none; text-align: center; margin: 20px 0; color: #60a5fa; font-weight: bold; }
        #result { margin-top: 30px; display: none; border-top: 1px solid #3d4756; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>심층 심리 분석</h1>
        <input type="text" id="name" placeholder="이름을 입력하세요">
        <select id="gender"><option value="남성">남성</option><option value="여성">여성</option></select>
        <input type="date" id="birth">
        <button onclick="startAnalysis()">분석 시작</button>

        <div id="loading">분석 중... 무의식 데이터를 스캔하고 있습니다.</div>
        <div id="result">
            <h2 id="resName"></h2>
            <p id="resDesc"></p>
        </div>
    </div>

    <script>
        function startAnalysis() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            setTimeout(() => {
                const name = document.getElementById('name').value;
                const gender = document.getElementById('gender').value;
                const insights = [
                    "표면적으로는 평온해 보이지만, 마음속에는 거대한 폭풍을 견뎌내고 있군요. 당신의 인내심은 주변 사람들의 상상을 초월합니다.",
                    "타고난 직관력이 매우 뛰어납니다. 남들이 보지 못하는 흐름을 읽는 재능이 있으니, 지금 고민하는 일에 확신을 가져도 좋습니다.",
                    "자신에게 너무 엄격한 기준을 들이대고 계시네요. 때로는 당신의 노력을 당신 스스로 인정해 줄 필요가 있습니다."
                ];
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                document.getElementById('resName').innerText = `${name}님의 분석 결과`;
                document.getElementById('resDesc').innerText = insights[Math.floor(Math.random() * insights.length)];
            }, 2500); // 2.5초간 긴장감 있는 로딩
        }
    </script>
</body>
</html>
