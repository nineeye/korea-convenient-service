<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘의 운동 루틴 빌더</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f8fafc; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 16px; }
        button { background: #3b82f6; color: white; border: none; font-weight: bold; cursor: pointer; }
        #routineResult { margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h1>💪 오늘의 운동 루틴</h1>
        <select id="part">
            <option value="chest">가슴 (Chest)</option>
            <option value="back">등 (Back)</option>
            <option value="leg">하체 (Leg)</option>
        </select>
        <button onclick="buildRoutine()">루틴 생성하기</button>
        <div id="routineResult">운동 부위를 선택하고 버튼을 누르세요!</div>
    </div>

    <script>
        const routines = {
            chest: ["벤치 프레스 10회 x 3세트", "인클라인 덤벨 프레스 12회 x 3세트", "푸쉬업 20회 x 3세트"],
            back: ["렛풀다운 12회 x 3세트", "시티드 로우 12회 x 3세트", "데드리프트 8회 x 3세트"],
            leg: ["스쿼트 12회 x 4세트", "레그 프레스 15회 x 3세트", "런지 20회 x 3세트"]
        };

        function buildRoutine() {
            const part = document.getElementById('part').value;
            const exercises = routines[part];
            let html = "<h3>오늘의 계획</h3><ul>";
            exercises.forEach(ex => html += `<li>${ex}</li>`);
            html += "</ul>";
            document.getElementById('routineResult').innerHTML = html;
        }
    </script>
</body>
</html>
