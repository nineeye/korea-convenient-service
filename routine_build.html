<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>올인원 운동 데이터 센터</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f59e0b; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .display { font-size: 24px; font-weight: bold; color: #f59e0b; margin-top: 10px; }
    </style>
</head>
<body>
    <!-- 1. 1RM 계산기 -->
    <div class="card">
        <h3>💪 1RM 최대 중량 확인</h3>
        <input type="number" id="w" placeholder="중량 (kg)">
        <input type="number" id="r" placeholder="횟수 (reps)">
        <button onclick="calc1RM()">계산하기</button>
        <div id="res1" class="display">- kg</div>
    </div>

    <!-- 2. 주간 볼륨 기록기 -->
    <div class="card">
        <h3>📊 오늘 운동 볼륨 (kg × 횟수 × 세트)</h3>
        <input type="number" id="vol" placeholder="총 합계 (자동계산)">
        <button onclick="addVolume()">오늘 기록 추가하기</button>
        <div id="res2" class="display">누적: 0 kg</div>
    </div>

    <!-- 3. 휴식 타이머 -->
    <div class="card">
        <h3>⏱ 휴식 타이머 (초)</h3>
        <input type="number" id="sec" placeholder="90">
        <button onclick="startTimer()">타이머 시작</button>
        <div id="timer" class="display">00:00</div>
    </div>

    <script>
        // 1. 1RM 계산 (Brzycki 공식)
        function calc1RM() {
            let w = document.getElementById('w').value;
            let r = document.getElementById('r').value;
            let res = Math.round(w / (1.0278 - (0.0278 * r)));
            document.getElementById('res1').innerText = res + " kg";
        }

        // 2. 볼륨 기록
        let totalVol = 0;
        function addVolume() {
            totalVol += parseInt(document.getElementById('vol').value || 0);
            document.getElementById('res2').innerText = "누적: " + totalVol + " kg";
        }

        // 3. 타이머
        function startTimer() {
            let s = parseInt(document.getElementById('sec').value);
            let display = document.getElementById('timer');
            let interval = setInterval(() => {
                s--;
                display.innerText = Math.floor(s/60) + ":" + (s%60).toString().padStart(2, '0');
                if (s <= 0) { clearInterval(interval); alert("휴식 끝! 다시 시작하세요!"); }
            }, 1000);
        }
    </script>
</body>
</html>
