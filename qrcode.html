<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 1초 QR 코드 생성기</title>
    <!-- QR 코드 생성 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- 카카오톡 공유 SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js" integrity="sha384-6MFdIr0zOira1CHQlzGZ5OxsRclEbg-10XzEaH2E5p/sR32Zf+E/qY7vEokzH55T" crossorigin="anonymous"></script>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; background-color: #f4f7f6; margin: 0; 
        }
        .container { 
            background: white; padding: 40px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; 
        }
        h2 { margin-top: 0; color: #333; }
        input { 
            width: 90%; padding: 12px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; 
        }
        input:focus { border-color: #4CAF50; }
        .generate-btn { 
            background-color: #4CAF50; color: white; border: none; 
            padding: 12px 24px; font-size: 16px; font-weight: bold; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .generate-btn:hover { background-color: #45a049; }
        #qrcode { margin: 25px auto; display: flex; justify-content: center; min-height: 150px; }
        #qrcode img { display: none; } /* 처음엔 숨김 */
        .share-btns { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .kakao-btn { 
            background-color: #FEE500; color: #000; border: none; 
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; 
        }
        .email-btn { 
            background-color: #007BFF; color: white; border: none; 
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 1초 QR 코드 생성기</h2>
    <input type="text" id="urlInput" placeholder="URL이나 텍스트를 입력하세요 (예: https://google.com)">
    <button class="generate-btn" onclick="generateQR()">QR 코드 생성</button>

    <!-- QR 코드가 나타날 공간 -->
    <div id="qrcode"></div>

    <!-- 공유 버튼들 (초기에는 숨김 처리) -->
    <div class="share-btns" id="shareBtns" style="display: none;">
        <button class="kakao-btn" onclick="shareKakao()">💬 카톡 공유</button>
        <button class="email-btn" onclick="shareEmail()">📧 이메일 공유</button>
    </div>
</div>

<script>
    // ⚠️ 주의: 카카오톡 공유 기능을 사용하려면 아래 주석을 풀고 본인의 JavaScript 키를 넣어야 합니다.
    // Kakao.init('여기에_본인의_카카오_JAVASCRIPT_KEY를_입력하세요');

    function generateQR() {
        const text = document.getElementById("urlInput").value;
        const qrContainer = document.getElementById("qrcode");
        const shareBtns = document.getElementById("shareBtns");

        if (!text) {
            alert("URL이나 텍스트를 입력해주세요!");
            return;
        }

        // 기존에 생성된 QR 코드 초기화
        qrContainer.innerHTML = "";

        // 새로운 QR 코드 1초 만에 생성!
        new QRCode(qrContainer, {
            text: text,
            width: 150,
            height: 150,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // 생성 완료 후 공유 버튼 표시
        shareBtns.style.display = "flex";
    }

    // 이메일 공유 기능 (기본 메일 앱 연동)
    function shareEmail() {
        const text = document.getElementById("urlInput").value;
        if(!text) return;

        const subject = encodeURIComponent("공유된 링크/텍스트입니다.");
        const body = encodeURIComponent(`다음 내용을 확인해보세요:\n\n${text}`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    // 카카오톡 공유 기능
    function shareKakao() {
        const text = document.getElementById("urlInput").value;
        if(!text) return;

        // 키가 입력되지 않아 초기화가 안 된 경우 경고창
        if (!Kakao.isInitialized()) {
            alert("카카오 API가 연동되지 않았습니다. 코드 내에 JavaScript 키를 입력해주세요!");
            return;
        }

        // 카카오톡 링크 전송
        Kakao.Share.sendDefault({
            objectType: 'text',
            text: `공유된 링크입니다:\n${text}`,
            link: {
                mobileWebUrl: text,
                webUrl: text,
            },
        });
    }
</script>
</body>
</html>
