<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일정 알람 대시보드</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 40px; background: #f0f4f8; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        input { padding: 12px; margin: 5px; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; }
        .alarm-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; margin-top: 10px; align-items: center; }
        #alertBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(225, 29, 72, 0.9); color: white; padding-top: 20%; font-size: 30px; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>

    <div class="box">
        <h1>📋 일정 알람 대시보드</h1>
        <input type="text" id="name" placeholder="알람 내용">
        <input type="time" id="time">
        <button onclick="addAlarm()">+ 등록</button>
        <div id="alarmList" style="margin-top:20px;"></div>
    </div>

    <div id="alertBox">
        <span id="alertText"></span><br><br>
        <button onclick="stopAlarm()" style="background:#fff; color:#e11d48; font-size:20px; padding:20px 40px;">🛑 알람 끄기</button>
    </div>

    <script>
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        // 화면 클릭 시 오디오 초기화 (브라우저 정책 해결)
        document.body.addEventListener('click', () => {
            audio.play().then(() => audio.pause()).catch(() => {});
        }, { once: true });

        function addAlarm() {
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;
            if (!name || !time) return alert("내용과 시간을 입력하세요!");

            const div = document.createElement('div');
            div.className = 'alarm-item';
            div.dataset.time = time;
            div.dataset.name = name;
            div.innerHTML = `<span>🔔 ${name} (${time})</span> <button onclick="this.parentElement.remove()" style="background:red;">삭제</button>`;
            document.getElementById('alarmList').appendChild(div);
            
            document.getElementById('name').value = '';
        }

        function stopAlarm() {
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('alertBox').style.display = 'none';
        }

        setInterval(() => {
            const now = new Date();
            const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            document.querySelectorAll('.alarm-item').forEach(item => {
                if (item.dataset.time === nowTime && !item.classList.contains('fired')) {
                    item.classList.add('fired');
                    audio.play();
                    document.getElementById('alertText').innerText = '🔔 알림 시간입니다: ' + item.dataset.name;
                    document.getElementById('alertBox').style.display = 'block';
                }
            });
        }, 1000);
    </script>
</body>
</html>
