<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일정 알람 대시보드</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 40px; background: #f0f4f8; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        input { padding: 12px; margin: 5px; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; }
        .alarm-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; margin-top: 10px; }
        #alertBox { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e11d48; color: white; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body onclick="audio.play(); audio.pause();"> <div class="box">
        <h1>📋 일정 알람 대시보드</h1>
        <input type="text" id="name" placeholder="알람 내용">
        <input type="time" id="time">
        <button onclick="addAlarm()">+ 등록</button>
        
        <div id="alarmList" style="margin-top:20px;"></div>
    </div>

    <div id="alertBox">
        <span id="alertText"></span><br><br>
        <button onclick="stopAlarm()" style="background:#fff; color:#e11d48;">알람 끄기</button>
    </div>

    <script>
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        function addAlarm() {
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;
            if (!name || !time) return;

            const div = document.createElement('div');
            div.className = 'alarm-item';
            div.dataset.time = time;
            div.dataset.name = name;
            div.innerHTML = `<span>🔔 ${name} (${time})</span> <button onclick="this.parentElement.remove()" style="background:red; padding:5px 10px;">삭제</button>`;
            document.getElementById('alarmList').appendChild(div);
            
            document.getElementById('name').value = '';
        }

        function stopAlarm() {
            audio.pause();
            audio.currentTime = 0;
            document.getElementById('alertBox').style.display = 'none';
        }

        // 1초마다 시간 체크
        setInterval(() => {
            const now = new Date();
            const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            document.querySelectorAll('.alarm-item').forEach(item => {
                if (item.dataset.time === nowTime && !item.classList.contains('fired')) {
                    item.classList.add('fired'); // 중복 울림 방지
                    audio.play();
                    document.getElementById('alertText').innerText = '🔔 알림 시간입니다: ' + item.dataset.name;
                    document.getElementById('alertBox').style.display = 'block';
                }
            });
        }, 1000);
    </script>
</body>
</html>
