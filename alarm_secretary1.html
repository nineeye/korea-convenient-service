<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만능 알림 타이머 비서 | 웹 뽀모도로 타이머</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; justify-content: center; }
        .container { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; text-align: center; }
        .timer-display { font-size: 64px; font-weight: 900; color: #ec4899; margin: 20px 0; background: #fff5f7; padding: 25px; border-radius: 20px; border: 2px dashed #fbcfe8; }
        .btn-action { padding: 15px; width: 100%; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-start { background: #ec4899; }
        .btn-reset { background: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⏰ 만능 알림 타이머 비서</h2>
        <div class="timer-display" id="timeDisplay">00:00</div>
        
        <div style="margin-bottom: 20px;">
            <input type="number" id="inputMin" placeholder="분" style="width: 60px; padding: 10px;">
            <input type="number" id="inputSec" placeholder="초" style="width: 60px; padding: 10px;">
        </div>
        
        <button class="btn-action btn-start" id="btnStart" onclick="toggleTimer()">🚀 타이머 시작</button>
        <button class="btn-action btn-reset" onclick="resetTimer()">🔄 타이머 초기화</button>
    </div>

    <audio id="alarmAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav"></audio>

    <script>
        let timerId = null, timeLeft = 0, isRunning = false;
        const timeDisplay = document.getElementById('timeDisplay'), btnStart = document.getElementById('btnStart'), alarmAudio = document.getElementById('alarmAudio');

        // 권한 및 상호작용 초기화
        window.onload = () => {
            if (Notification.permission !== "granted") Notification.requestPermission();
            document.body.addEventListener('click', () => alarmAudio.load(), { once: true });
        };

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            timeDisplay.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (!isRunning) {
                const m = parseInt(document.getElementById('inputMin').value) || 0;
                const s = parseInt(document.getElementById('inputSec').value) || 0;
                timeLeft = (m * 60) + s;
                if (timeLeft <= 0) return alert('시간을 설정해주세요!');
                
                isRunning = true;
                btnStart.innerText = "⏸️ 일시정지";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        triggerAlarm();
                        resetTimer();
                    }
                }, 1000);
            } else {
                isRunning = false;
                btnStart.innerText = "🚀 다시 시작";
                clearInterval(timerId);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timeLeft = 0; isRunning = false;
            btnStart.innerText = "🚀 타이머 시작";
            updateDisplay();
        }

        async function triggerAlarm() {
            if (Notification.permission === "granted") {
                new Notification("⏰ 알림 완료!", { body: "설정하신 시간이 종료되었습니다!" });
            }
            try { await alarmAudio.play(); } catch(e) { console.log("자동재생 제한됨"); }
            setTimeout(() => alert("🎉 시간이 완료되었습니다!"), 500);
        }
    </script>
</body>
</html>
