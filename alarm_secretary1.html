<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>만능 알림 타이머 비서</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f4f8; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .timer-display { font-size: 60px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        button { padding: 15px 30px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; }
    </style>
</head>
<body>

<div class="container">
    <h2>⏰ 만능 알림 타이머</h2>
    <div class="timer-display" id="timeDisplay">00:00</div>
    <input type="number" id="min" placeholder="분" style="width:50px">
    <input type="number" id="sec" placeholder="초" style="width:50px">
    <br><br>
    <button id="btnStart" onclick="startTimer()">🚀 타이머 시작</button>
</div>

<audio id="alarmAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav"></audio>

<script>
    let timeLeft = 0, timerId = null;
    const audio = document.getElementById('alarmAudio');

    // [중요] 페이지 아무 데나 클릭하면 브라우저에게 "나 소리 재생 허락해줘!"라고 신호 보내기
    document.addEventListener('click', () => {
        audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
            console.log("오디오 권한 확보 완료");
        }).catch(e => console.log("권한 대기 중..."));
    }, { once: true });

    function startTimer() {
        if(timerId) clearInterval(timerId);
        timeLeft = (parseInt(document.getElementById('min').value) || 0) * 60 + (parseInt(document.getElementById('sec').value) || 0);
        
        timerId = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timeDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerId);
                triggerAlarm();
            }
        }, 1000);
    }

    function triggerAlarm() {
        // 소리 재생 (클릭 권한이 확보되었다면 여기서 울립니다)
        audio.play().catch(e => alert("소리를 재생하려면 페이지를 한 번 클릭해주세요!"));
        alert("🎉 시간이 완료되었습니다!");
    }
</script>
</body>
</html>
