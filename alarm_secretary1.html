<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>만능 알림 타이머 비서</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f4f8; transition: background 0.5s; }
        .flash { background: #ff9f9f !important; } /* 깜빡임 효과용 클래스 */
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .timer-display { font-size: 60px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        button { padding: 15px 30px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>⏰ 만능 알림 타이머</h2>
    <div class="timer-display" id="timeDisplay">00:00</div>
    <input type="number" id="min" placeholder="분" style="width:50px">
    <input type="number" id="sec" placeholder="초" style="width:50px">
    <br><br>
    <button id="btnStart" onclick="startTimer()">🚀 타이머 시작</button>
</div>

<audio id="alarmAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" loop></audio>

<script>
    let timeLeft = 0, timerId = null;
    const audio = document.getElementById('alarmAudio');
    const container = document.getElementById('mainContainer');

    function startTimer() {
        if(timerId) clearInterval(timerId);
        timeLeft = (parseInt(document.getElementById('min').value) || 0) * 60 + (parseInt(document.getElementById('sec').value) || 0);
        
        timerId = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timeDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerId);
                triggerAlarm();
            }
        }, 1000);
    }

    async function triggerAlarm() {
    console.log("알람 발생 시작!"); // 로그 1
    
    // 알림 권한 상태 체크
    console.log("알림 권한 상태:", Notification.permission); 

    try {
        await audio.play();
        console.log("오디오 재생 성공!"); // 성공하면 이게 뜸
    } catch (e) {
        // [핵심] 여기서 왜 안 되는지 정확한 이유를 출력합니다.
        console.error("오디오 재생 실패 이유:", e); 
    }
    
    alert("🎉 시간이 완료되었습니다!");
}

    function triggerAlarm() {
        // 1. 소리 재생
        audio.play();
        
        // 2. 화면 깜빡임 효과 (대시보드와 동일한 방식)
        let count = 0;
        const flashInterval = setInterval(() => {
            document.body.classList.toggle('flash');
            count++;
            if (count > 10) { // 5번 깜빡이고 멈춤
                clearInterval(flashInterval);
                document.body.classList.remove('flash');
            }
        }, 500);

        // 3. 사용자가 직접 끄게 하는 안내
        if(confirm("⏰ 시간이 완료되었습니다! 알람을 끄려면 확인을 누르세요.")) {
            audio.pause();
            audio.currentTime = 0;
            clearInterval(flashInterval);
            document.body.classList.remove('flash');
        }
    }
</script>
</body>
</html>
