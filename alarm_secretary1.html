<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>만능 알림 타이머 비서</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f4f8; transition: background 0.5s; }
        .flash { background: #ff9f9f !important; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .timer-display { font-size: 60px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        #stopBtn { display: none; background: #334155; padding: 15px 30px; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button { padding: 15px 30px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="statusTitle">⏰만능 알림 타이머</h2>
    <div class="timer-display" id="timeDisplay">00:00</div>
    <input type="number" id="min" placeholder="분" style="width:50px">
    <input type="number" id="sec" placeholder="초" style="width:50px">
    <br><br>
    <button id="startBtn" onclick="startTimer()">🚀 타이머 시작</button>
    <button id="stopBtn" onclick="stopAlarm()">🛑 알람 끄기</button>
</div>

<script>
    let timeLeft = 0, timerId = null;
    // 구글에서 제공하는 가장 안정적인 알람 소리 링크로 교체했습니다.
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    audio.loop = true;

    function startTimer() {
        if(timerId) clearInterval(timerId);
        timeLeft = (parseInt(document.getElementById('min').value) || 0) * 60 + (parseInt(document.getElementById('sec').value) || 0);
        document.getElementById('stopBtn').style.display = "none";
        
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timeDisplay').innerText = 
                `${String(Math.floor(timeLeft / 60)).padStart(2,'0')}:${String(timeLeft % 60).padStart(2,'0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerId);
                triggerAlarm();
            }
        }, 1000);
    }

    function triggerAlarm() {
        // [핵심] 오디오 재생 시도
        audio.play().catch(e => console.log("자동 재생 정책으로 인해 클릭이 필요합니다."));
        
        document.getElementById('statusTitle').innerText = "⏰ 시간이 완료되었습니다!";
        document.getElementById('stopBtn').style.display = "inline-block";
        
        // 화면 깜빡임
        window.flashInterval = setInterval(() => {
            document.body.classList.toggle('flash');
        }, 500);
    }

    function stopAlarm() {
        audio.pause();
        audio.currentTime = 0;
        clearInterval(window.flashInterval);
        document.body.classList.remove('flash');
        document.getElementById('statusTitle').innerText = "⏰ 만능 알림 타이머";
        document.getElementById('stopBtn').style.display = "none";
    }
</script>
</body>
</html>
