<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알림 대시보드</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📋 알림 대시보드</h1>
        <input type="text" id="name" placeholder="내용"><br><br>
        <input type="time" id="time"><br><br>
        <button onclick="add()">+ 등록</button>
        <div id="list" style="margin-top:20px;"></div>
    </div>
    <script>
        function add() {
            const n = document.getElementById('name').value;
            const t = document.getElementById('time').value;
            const div = document.createElement('div');
            div.className = 'item'; div.dataset.t = t;
            div.innerHTML = `${n} (${t}) <button onclick="this.parentElement.remove()">삭제</button>`;
            document.getElementById('list').appendChild(div);
        }
        setInterval(() => {
            const now = new Date().toTimeString().slice(0,5);
            document.querySelectorAll('.item').forEach(i => {
                if(i.dataset.t === now && !i.classList.contains('fired')) {
                    i.classList.add('fired'); alert('알림: ' + i.innerText);
                }
            });
        }, 1000);
    </script>
</body>
</html>
