<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 구글 상위 노출용 글자수세기 핵심 키워드 매립 -->
    <title>온라인 실시간 글자수세기 | 자소서 글자수 계산기</title>
    <meta name="description" content="실시간으로 공백 포함/제외 글자수를 정확하게 계산해 주는 온라인 글자수세기 도구입니다. 자기소개서, 블로그 포스팅 글자수 검사에 최적화되어 있습니다.">
    <meta name="keywords" content="글자수세기, 글자수계산기, 자소서글자수, 실시간글자수, 글자수검사">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            justify-content: center;
        }
        /* 4분할 네비게이션 탭 스타일 통일 */
        .nav { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 20px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .nav a { 
            padding: 10px 16px; 
            background: #e2e8f0; 
            color: #475569;
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav a:hover {
            background: #cbd5e1;
        }
        .nav a.active { 
            background: #3b82f6; /* 글자수 페이지 고유 테마 컬러 */
            color: white; 
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 600px; 
            box-sizing: border-box;
        }
        h2 {
            color: #0f172a;
            font-size: 22px;
            margin: 0 0 6px 0;
            font-weight: 800;
            text-align: center;
        }
        .sub-desc {
            color: #64748b;
            font-size: 13px;
            text-align: center;
            margin: 0 0 20px 0;
        }
        textarea { 
            width: 100%; 
            height: 200px; 
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            resize: vertical;
            background: #f8fafc;
            line-height: 1.6;
        }
        textarea:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* 전광판 대시보드 */
        .count-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0 0 0;
        }
        .count-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .count-box .label {
            font-size: 12px;
            color: #475569;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .count-box .number {
            font-size: 24px;
            font-weight: 800;
            color: #1e3a8a;
        }
        .count-box.highlight .number {
            color: #d97706; /* 공백제외 포인트 컬러 */
        }
    </style>
</head>
<body>

    <!-- 4분할 탭 일치화 -->
    <div class="nav">
        <a href="bigsmalltextchange1.html" class="active">글자수</a>
        <a href="bigsmalltextchange2.html">대소문자</a>
        <a href="bigsmalltextchange3.html">맞춤법</a>
        <a href="bigsmalltextchange4.html">공백제거</a>
    </div>

    <div class="container">
        <h2>📝 실시간 글자수세기</h2>
        <p class="sub-desc">텍스트를 입력하시면 실시간으로 글자수가 자동 계산됩니다.</p>
        
        <textarea id="textInput" placeholder="내용을 입력하거나 붙여넣으세요..." oninput="counter()"></textarea>
        
        <div class="count-board">
            <div class="count-box">
                <div class="label">공백 포함</div>
                <div id="withSpace" class="number">0</div>
            </div>
            <div class="count-box highlight">
                <div class="label">공백 제외</div>
                <div id="withoutSpace" class="number">0</div>
            </div>
        </div>
    </div>

    <script>
        function counter() {
            const text = document.getElementById('textInput').value;
            
            // 공백 포함 글자수
            const withSpaceCount = text.length;
            
            // 공백 제외 글자수 (\s 필터로 공백, 탭, 줄바꿈 전체 제거 후 카운트)
            const withoutSpaceCount = text.replace(/\s/g, "").length;

            document.getElementById('withSpace').innerText = withSpaceCount;
            document.getElementById('withoutSpace').innerText = withoutSpaceCount;
        }
    </script>
</body>
</html>
