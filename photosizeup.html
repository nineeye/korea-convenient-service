<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초강력 서버 연동형 AI 고화질 확대기</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f4f7f6; padding: 40px 20px; display: flex; justify-content: center; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .server-config { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; border: 1px solid #ffeeba; }
        .server-config input { width: 100%; padding: 8px; margin-top: 8px; border-radius: 4px; border: 1px solid #ced4da; }
        .upload-box { border: 2px dashed #3498db; padding: 40px 30px; text-align: center; border-radius: 8px; background-color: #ebf5fb; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; }
        .preview-container { display: none; text-align: center; margin-bottom: 20px; }
        .preview-container img { max-width: 100%; height: auto; border-radius: 6px; border: 1px solid #ccc; margin-top: 10px; }
        .btn-download { width: 100%; padding: 15px; background-color: #95a5a6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: not-allowed; transition: background 0.2s; }
        .btn-download.active { background-color: #2ecc71; cursor: pointer; }
        .loading { background-color: #e67e22 !important; cursor: wait !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 초강력 AI 고화질 확대기 (서버형)</h2>
        
        <div class="server-config">
            <strong>🔗 1단계에서 생성된 구글 코랩 주소를 입력하세요</strong>
            <input type="text" id="serverUrlInput" placeholder="https://xxxx.ngrok-free.app 형태의 주소 붙여넣기">
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 클릭하여 이미지 선택</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="preview-container" id="previewArea">
            <label style="font-weight: bold;">선택된 원본 이미지</label><br>
            <img id="previewImg" src="">
            <div id="infoText" style="margin-top: 10px; font-size: 14px; color: #555;"></div>
        </div>

        <button class="btn-download" id="downloadBtn" disabled>주소 입력 및 이미지를 등록해주세요</button>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const downloadBtn = document.getElementById('downloadBtn');
        const serverUrlInput = document.getElementById('serverUrlInput');
        const infoText = document.getElementById('infoText');

        let base64Image = "";
        let originalFileName = "";

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            originalFileName = file.name.split('.')[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                base64Image = event.target.result;
                previewImg.src = base64Image;
                previewArea.style.display = 'block';
                
                const img = new Image();
                img.onload = function() {
                    infoText.innerHTML = `원본 크기: ${img.width}x${img.height}px ➡️ <strong>AI 4배 확대 예정: ${img.width*4}x${img.height*4}px</strong>`;
                };
                img.src = base64Image;
                checkReady();
            };
            reader.readAsDataURL(file);
        });

        serverUrlInput.addEventListener('input', checkReady);

        function checkReady() {
            if (base64Image && serverUrlInput.value.trim() !== "") {
                downloadBtn.disabled = false;
                downloadBtn.classList.add('active');
                downloadBtn.innerText = '🔥 구글 AI 서버로 고화질 확대 시작';
            }
        }

        downloadBtn.addEventListener('click', async function() {
            let serverUrl = serverUrlInput.value.trim();
            if (!serverUrl.endsWith('/upscale')) {
                serverUrl = serverUrl + '/upscale';
            }

            try {
                downloadBtn.classList.add('loading');
                downloadBtn.innerText = '⚡ 구글 초고성능 GPU 가동 중... (약 5~10초 소요)';
                downloadBtn.disabled = true;

                // 구글 코랩 서버로 이미지 전송 및 AI 연산 요청
                const response = await fetch(serverUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                const result = await response.json();

                if (result.success && result.image) {
                    // 서버가 보내준 진짜 고화질 이미지 다운로드
                    const link = document.createElement('a');
                    link.download = `${originalFileName}_RealESRGAN_4x.png`;
                    link.href = result.image;
                    link.click();
                } else {
                    alert("서버 연산 오류: " + (result.error || "알 수 없는 에러"));
                }

            } catch (error) {
                console.error(error);
                alert("AI 서버와 연결할 수 없습니다. 코랩 주소가 정확한지, 코랩이 실행 중인지 확인해 주세요.");
            } finally {
                downloadBtn.classList.remove('loading');
                downloadBtn.disabled = false;
                downloadBtn.innerText = '🔥 구글 AI 서버로 고화질 확대 시작';
            }
        });
    </script>
</body>
</html>
