<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고화질 이미지 확대기</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }

        .warning-box {
            background-color: #e8f8f5;
            color: #117a65;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #2ecc71;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #3498db;
            padding: 40px 30px;
            text-align: center;
            border-radius: 8px;
            background-color: #ebf5fb;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upload-box.dragover {
            background-color: #d6eaf8;
            border-color: #2980b9;
            transform: scale(1.02);
        }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; cursor: pointer; pointer-events: none; }
        .upload-sub { font-size: 13px; color: #7f8c8d; margin-top: 8px; pointer-events: none; }

        .settings {
            display: block; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
        }

        .preview-container {
            display: none; 
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .info-text { font-size: 15px; color: #334155; margin-top: 15px; }

        .btn-download {
            width: 100%;
            padding: 15px;
            background-color: #95a5a6; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            transition: background 0.2s;
        }
        
        .btn-download.active {
            background-color: #2ecc71;
            cursor: pointer;
        }
        .btn-download.active:hover { background-color: #27ae60; }
        .btn-download.active:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔍 고화질 이미지 확대기 (선명도 최적화)</h2>
        
        <div class="warning-box">
            <strong>✨ 알고리즘 업데이트 안내</strong><br>
            외부 라이브러리 차단 오류를 해결했습니다. 확장 보간법과 경계선 윤곽 복원 필터(Sharpening)를 결합하여 흐릿함 없이 또렷하고 깔끔한 결과물을 즉시 만듭니다.
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 클릭하여 이미지 선택</span>
            <span class="upload-sub">(또는 파일을 여기로 끌어다 놓으세요)</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="settings" id="settingsArea">
            <div class="setting-group">
                <label>확대 배율 선택</label>
                <select id="scaleSelect">
                    <option value="2">2배 확대 (200%)</option>
                    <option value="4" selected>4배 확대 (400%)</option>
                    <option value="8">8배 확대 (800%)</option>
                </select>
            </div>
        </div>

        <div class="preview-container" id="previewArea">
            <label style="font-weight: bold; color: #2c3e50;">원본 미리보기</label><br><br>
            <img id="previewImg" src="" alt="미리보기">
            <div class="info-text" id="resolutionInfo"></div>
        </div>

        <button class="btn-download" id="downloadBtn" disabled>이미지를 먼저 등록해주세요</button>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const scaleSelect = document.getElementById('scaleSelect');
        const previewImg = document.getElementById('previewImg');
        const resolutionInfo = document.getElementById('resolutionInfo');

        let originalImg = new Image();
        let originalFileName = '';

        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            originalFileName = file.name.split('.')[0];
            
            const reader = new FileReader();
            reader.onload = function(event) {
                // 두 군데 모두 안전하게 데이터 입력
                previewImg.src = event.target.result;
                originalImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 이미지 로드가 완료되면 UI 활성화
        originalImg.onload = function() {
            previewArea.style.display = 'block';
            downloadBtn.disabled = false;
            downloadBtn.classList.add('active');
            downloadBtn.innerText = '고화질 복원 및 다운로드';
            updateInfo();
        };

        imageInput.addEventListener('change', function(e) { processFile(e.target.files[0]); });
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                imageInput.files = e.dataTransfer.files;
                processFile(e.dataTransfer.files[0]);
            }
        });

        scaleSelect.addEventListener('change', updateInfo);

        function updateInfo() {
            if (!originalImg.src || !originalImg.width) return;

            const scale = parseInt(scaleSelect.value);
            const newWidth = originalImg.width * scale;
            const newHeight = originalImg.height * scale;
            
            resolutionInfo.innerHTML = `원본: ${originalImg.width} x ${originalImg.height}px <br> <strong>변환 후 예상: <span style="color:#2980b9">${newWidth} x ${newHeight}px</span></strong>`;
        }

        // 🚀 핵심: 픽셀을 정밀 확대 후 외곽선 선명화 콤보 필터 적용
        downloadBtn.addEventListener('click', function() {
            if (!originalImg.src || this.disabled) return;

            const scale = parseInt(scaleSelect.value);
            const w = originalImg.width * scale;
            const h = originalImg.height * scale;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = w;
            canvas.height = h;

            // 1차: 고품질 이미지 보간법 적용하여 픽셀 깨짐 방지
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(originalImg, 0, 0, w, h);

            // 2차: 이미지 선명화(Sharpening) 컨볼루션 매트릭스 필터 적용 (웹툰/일러스트 선 또렷하게 만들기)
            try {
                const imgData = ctx.getImageData(0, 0, w, h);
                const data = imgData.data;
                const buffer = new Uint8ClampedArray(data);

                // 선명화 필터 커널 (주변 대비 중앙부 대비 극대화)
                const k = [
                     0, -0.4,  0,
                  -0.4,  2.6, -0.4,
                     0, -0.4,  0
                ];

                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        let r=0, g=0, b=0;
                        for (let cy = -1; cy <= 1; cy++) {
                            for (let cx = -1; cx <= 1; cx++) {
                                const idx = ((y + cy) * w + (x + cx)) * 4;
                                const weight = k[(cy + 1) * 3 + (cx + 1)];
                                r += buffer[idx] * weight;
                                g += buffer[idx + 1] * weight;
                                b += buffer[idx + 2] * weight;
                            }
                        }
                        const outIdx = (y * w + x) * 4;
                        data[outIdx]     = Math.min(255, Math.max(0, r));
                        data[outIdx + 1] = Math.min(255, Math.max(0, g));
                        data[outIdx + 2] = Math.min(255, Math.max(0, b));
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            } catch (e) {
                console.log("로컬 보안 이슈로 기본 필터 우회 실행");
            }

            // 다운로드 링크 생성 및 실행
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `${originalFileName}_${scale}x_clear.png`;
            link.href = dataUrl;
            link.click();
        });
    </script>

</body>
</html>
