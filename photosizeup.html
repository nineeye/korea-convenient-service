<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 고화질 이미지 확대기</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.13.1/dist/browser/umd/upscaler.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }

        .warning-box {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #2196f3;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #3498db;
            padding: 40px 30px;
            text-align: center;
            border-radius: 8px;
            background-color: #ebf5fb;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upload-box.dragover {
            background-color: #d6eaf8;
            border-color: #2980b9;
            transform: scale(1.02);
        }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; cursor: pointer; pointer-events: none; }
        .upload-sub { font-size: 13px; color: #7f8c8d; margin-top: 8px; pointer-events: none; }

        .settings {
            display: block; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
        }

        .preview-container {
            display: none; 
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .info-text { font-size: 15px; color: #334155; margin-top: 15px; }
        
        .danger-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
        }

        .btn-download {
            width: 100%;
            padding: 15px;
            background-color: #95a5a6; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            transition: background 0.2s;
        }
        
        .btn-download.active {
            background-color: #2ecc71;
            cursor: pointer;
        }
        .btn-download.active:hover { background-color: #27ae60; }
        .btn-download.active:active { transform: scale(0.98); }
        .btn-disabled { background-color: #e74c3c !important; cursor: not-allowed; }
        .loading { background-color: #e67e22 !important; cursor: wait !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 AI 고화질 이미지 확대기</h2>
        
        <div class="warning-box">
            <strong>✨ AI 초고해상도(Super Resolution) 안내</strong><br>
            AI 신경망 엔진이 픽셀을 정밀 복원합니다. 최초 이미지 변환 시 AI 모델 파일 다운로드로 인해 수 초~십수 초 정도 시간이 걸릴 수 있습니다.
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 클릭하여 이미지 선택</span>
            <span class="upload-sub">(또는 파일을 여기로 끌어다 놓으세요)</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="settings" id="settingsArea">
            <div class="setting-group">
                <label>AI 확대 배율 선택</label>
                <select id="scaleSelect">
                    <option value="2">2배 AI 확대 (200% - 권장)</option>
                    <option value="4" selected>4배 AI 확대 (400%)</option>
                </select>
            </div>
        </div>

        <div class="preview-container" id="previewArea">
            <label style="font-weight: bold; color: #2c3e50;">원본 미리보기</label><br><br>
            <img id="previewImg" src="" alt="미리보기" crossOrigin="anonymous">
            <div class="info-text" id="resolutionInfo"></div>
            
            <div class="danger-text" id="dangerAlert">
                🚨 경고: 해상도가 너무 커서 브라우저 멈춤 현상이 발생할 수 있습니다!
            </div>
        </div>

        <button class="btn-download" id="downloadBtn" disabled>이미지를 먼저 등록해주세요</button>
    </div>

    <script>
        // 전역 변수로 upscaler 선언 (스크립트 에러 방지 위해 라이브러리 체크 후 생성)
        let upscaler;
        try {
            upscaler = new Upscaler();
        } catch (e) {
            console.error("Upscaler 초기화 대기 중...", e);
        }

        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const scaleSelect = document.getElementById('scaleSelect');
        const previewImg = document.getElementById('previewImg');
        const resolutionInfo = document.getElementById('resolutionInfo');
        const dangerAlert = document.getElementById('dangerAlert');

        let originalImg = new Image();
        let originalFileName = '';

        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            originalFileName = file.name.split('.')[0];
            
            const reader = new FileReader();
            reader.onload = function(event) {
                // 원본 소스 주입
                previewImg.src = event.target.result;
                originalImg.src = event.target.result;
                
                originalImg.onload = function() {
                    previewArea.style.display = 'block';
                    
                    downloadBtn.disabled = false;
                    downloadBtn.classList.remove('loading');
                    downloadBtn.classList.add('active');
                    downloadBtn.innerText = 'AI 복원 및 다운로드 시작';
                    
                    updateInfo();
                }
            };
            reader.readAsDataURL(file);
        }

        // 이벤트 리스너 정상 연결
        imageInput.addEventListener('change', function(e) { 
            if(e.target.files.length > 0) processFile(e.target.files[0]); 
        });
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                imageInput.files = e.dataTransfer.files;
                processFile(e.dataTransfer.files[0]);
            }
        });

        scaleSelect.addEventListener('change', updateInfo);

        function updateInfo() {
            if (!originalImg.src) return;

            const scale = parseInt(scaleSelect.value);
            const newWidth = originalImg.width * scale;
            const newHeight = originalImg.height * scale;
            
            resolutionInfo.innerHTML = `원본: ${originalImg.width} x ${originalImg.height}px <br> <strong>AI 예측 해상도: <span style="color:#2980b9">${newWidth} x ${newHeight}px</span></strong>`;

            if (newWidth > 2500 || newHeight > 2500) {
                dangerAlert.style.display = 'block';
            } else {
                dangerAlert.style.display = 'none';
            }
        }

        downloadBtn.addEventListener('click', async function() {
            if (!originalImg.src || this.disabled || this.classList.contains('loading')) return;

            // 라이브러리 재확인 예외 처리
            if (!upscaler) {
                try { upscaler = new Upscaler(); } catch(e) { 
                    alert("AI 라이브러리가 아직 로드되지 않았습니다. 페이지를 새로고침 해주세요."); 
                    return; 
                }
            }

            const scale = parseInt(scaleSelect.value);
            
            try {
                downloadBtn.classList.add('loading');
                downloadBtn.innerText = '⚡ AI 신경망 연산 중... (최초 실행 시 대기 시간이 길어질 수 있습니다)';
                
                // AI 비전 분석 작동
                const upscaledDataUrl = await upscaler.upscale(previewImg, {
                    scale: scale
                });

                const link = document.createElement('a');
                link.download = `${originalFileName}_AI_${scale}x.png`;
                link.href = upscaledDataUrl;
                link.click();

            } catch (error) {
                console.error("상세 에러 내용:", error);
                alert("AI 연산 오류가 발생했습니다. 개발자 도구(F12) 콘솔을 확인해 보거나, 컴퓨터를 리프레시 후 더 작은 이미지로 시도해 주세요.");
            } finally {
                downloadBtn.classList.remove('loading');
                downloadBtn.innerText = 'AI 복원 및 다운로드 시작';
            }
        });
    </script>

</body>
</html>
