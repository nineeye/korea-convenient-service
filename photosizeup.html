<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 고화질 이미지 확대기</title>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/default-model@latest/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }

        .warning-box {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #2196f3;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #3498db;
            padding: 40px 30px;
            text-align: center;
            border-radius: 8px;
            background-color: #ebf5fb;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upload-box.dragover {
            background-color: #d6eaf8;
            border-color: #2980b9;
            transform: scale(1.02);
        }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; cursor: pointer; pointer-events: none; }
        .upload-sub { font-size: 13px; color: #7f8c8d; margin-top: 8px; pointer-events: none; }

        .settings {
            display: block; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
        }

        .preview-container {
            display: none; 
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .info-text { font-size: 15px; color: #334155; margin-top: 15px; }
        
        .danger-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
        }

        .btn-download {
            width: 100%;
            padding: 15px;
            background-color: #95a5a6; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            transition: background 0.2s;
        }
        
        .btn-download.active {
            background-color: #2ecc71;
            cursor: pointer;
        }
        .btn-download.active:hover { background-color: #27ae60; }
        .btn-download.active:active { transform: scale(0.98); }
        .btn-disabled { background-color: #e74c3c !important; cursor: not-allowed; }
        
        /* AI 연산 중 로딩 애니메이션 효과 */
        .loading { background-color: #e67e22 !important; cursor: wait !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 AI 고화질 이미지 확대기</h2>
        
        <div class="warning-box">
            <strong>✨ AI 초고해상도(Super Resolution) 안내</strong><br>
            단순히 픽셀을 늘리는 것이 아니라, AI가 선과 정밀도를 직접 예측하고 복원하여 흐려짐 없이 선명하게 확대합니다. (연산에 수 초~수십 초가 소요될 수 있습니다.)
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 클릭하여 이미지 선택</span>
            <span class="upload-sub">(또는 파일을 여기로 끌어다 놓으세요)</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="settings" id="settingsArea">
            <div class="setting-group">
                <label>AI 확대 배율 선택</label>
                <select id="scaleSelect">
                    <option value="2">2배 AI 확대 (200%)</option>
                    <option value="4" selected>4배 AI 확대 (400%)</option>
                </select>
            </div>
        </div>

        <div class="preview-container" id="previewArea">
            <label style="font-weight: bold; color: #2c3e50;">원본 미리보기</label><br><br>
            <img id="previewImg" src="" alt="미리보기">
            <div class="info-text" id="resolutionInfo"></div>
            
            <div class="danger-text" id="dangerAlert">
                🚨 경고: 해상도가 너무 커서 AI 연산 도중 브라우저 멈춤 현상이 발생할 수 있습니다!
            </div>
        </div>

        <button class="btn-download" id="downloadBtn" disabled>이미지를 먼저 등록해주세요</button>
    </div>

    <script>
        // 2. AI 업스케일러 인스턴스 초기화
        const upscaler = new Upscaler();

        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const scaleSelect = document.getElementById('scaleSelect');
        const previewImg = document.getElementById('previewImg');
        const resolutionInfo = document.getElementById('resolutionInfo');
        const dangerAlert = document.getElementById('dangerAlert');

        let originalImg = new Image();
        let originalFileName = '';

        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            originalFileName = file.name.split('.')[0];
            
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImg.src = event.target.result;
                previewImg.src = event.target.result;
                
                originalImg.onload = function() {
                    previewArea.style.display = 'block';
                    
                    downloadBtn.disabled = false;
                    downloadBtn.classList.remove('loading');
                    downloadBtn.classList.add('active');
                    downloadBtn.innerText = 'AI 복원 및 다운로드 시작';
                    
                    updateInfo();
                }
            };
            reader.readAsDataURL(file);
        }

        imageInput.addEventListener('change', function(e) {
            processFile(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                imageInput.files = e.dataTransfer.files;
                processFile(e.dataTransfer.files[0]);
            }
        });

        scaleSelect.addEventListener('change', updateInfo);

        function updateInfo() {
            if (!originalImg.src) return;

            const scale = parseInt(scaleSelect.value);
            const newWidth = originalImg.width * scale;
            const newHeight = originalImg.height * scale;
            
            resolutionInfo.innerHTML = `원본: ${originalImg.width} x ${originalImg.height}px <br> <strong>AI 예측 해상도: <span style="color:#2980b9">${newWidth} x ${newHeight}px</span></strong>`;

            // 사용자의 안전을 위해 변환용 해상도가 너무 크면 경고문 노출
            if (newWidth > 3000 || newHeight > 3000) {
                dangerAlert.style.display = 'block';
            } else {
                dangerAlert.style.display = 'none';
            }
        }

        // 3. 핵심 로직: AI 기반 이미지 업스케일링 실행
        downloadBtn.addEventListener('click', async function() {
            if (!originalImg.src || this.disabled || this.classList.contains('loading')) return;

            const scale = parseInt(scaleSelect.value);
            
            try {
                // UI 상태를 'AI 연산 중' 모드로 변경
                downloadBtn.classList.add('loading');
                downloadBtn.innerText = '⚡ AI 엔진 가동 및 픽셀 복원 중... (잠시만 기다려주세요)';
                
                // UpscalerJS를 사용한 AI 비전 연산 수행
                // 기본 모델은 IdealDeblur 2x / 4x를 지원하며, 내부적으로 보간법이 아닌 신경망 연산을 수행합니다.
                const upsaledDataUrl = await upscaler.upscale(previewImg, {
                    scale: scale
                });

                // 연산 완료 후 다운로드 실행
                const link = document.createElement('a');
                link.download = `${originalFileName}_AI_${scale}x.png`;
                link.href = upsaledDataUrl;
                link.click();

            } catch (error) {
                console.error(error);
                alert("AI 연산 중 오류가 발생했거나 브라우저 메모리가 부족합니다. 더 작은 이미지를 사용해 주세요.");
            } finally {
                // UI 복구
                downloadBtn.classList.remove('loading');
                downloadBtn.innerText = 'AI 복원 및 다운로드 시작';
            }
        });
    </script>

</body>
</html>
