<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고화질 이미지 확대기</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }

        /* 💡 추가된 주의사항 박스 스타일 */
        .warning-box {
            background-color: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #ffc107;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #3498db;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            background-color: #ebf5fb;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }
        .upload-box:hover { background-color: #d6eaf8; }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; cursor: pointer; }

        .settings {
            display: none;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
        }

        .preview-container {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .info-text { font-size: 15px; color: #334155; margin-top: 15px; }
        
        /* 💡 추가된 위험 경고 텍스트 (기본은 숨김) */
        .danger-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
        }

        .btn-download {
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: background 0.2s;
        }
        .btn-download:hover { background-color: #27ae60; }
        .btn-download:active { transform: scale(0.98); }
        .btn-disabled { background-color: #95a5a6 !important; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔍 브라우저 고화질 확대기</h2>
        
        <div class="warning-box">
            <strong>⚠️ 사용 전 주의사항</strong><br>
            이 도구는 브라우저의 메모리를 사용하여 이미지를 처리합니다. 
            이미 크기가 큰 원본 사진을 무리하게 8배로 확대할 경우, 컴퓨터 메모리 초과로 인해 <strong>브라우저가 일시적으로 멈추거나 꺼질 수 있습니다.</strong> 
            작은 아이콘, 로고, 저화질 이미지 위주로 사용을 권장합니다.
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 여기를 클릭하여 이미지 선택</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="settings" id="settingsArea">
            <div class="setting-group">
                <label>확대 배율 선택</label>
                <select id="scaleSelect">
                    <option value="2">2배 확대 (200%)</option>
                    <option value="4">4배 확대 (400%)</option>
                    <option value="8">8배 확대 (800%)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>이미지 최적화 방식</label>
                <select id="modeSelect">
                    <option value="photo">일반 사진 / 풍경 (부드럽게 보정)</option>
                    <option value="pixel">로고 /
