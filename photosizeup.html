<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고화질 이미지 확대기</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }

        .warning-box {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #4caf50;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed #3498db;
            padding: 40px 30px;
            text-align: center;
            border-radius: 8px;
            background-color: #ebf5fb;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upload-box.dragover {
            background-color: #d6eaf8;
            border-color: #2980b9;
            transform: scale(1.02);
        }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; cursor: pointer; pointer-events: none; }
        .upload-sub { font-size: 13px; color: #7f8c8d; margin-top: 8px; pointer-events: none; }

        .settings {
            display: block; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            outline: none;
        }

        .preview-container {
            display: none; 
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .info-text { font-size: 15px; color: #334155; margin-top: 15px; }

        .btn-download {
            width: 100%;
            padding: 15px;
            background-color: #95a5a6; 
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            transition: background 0.2s;
        }
        
        .btn-download.active {
            background-color: #2ecc71;
            cursor: pointer;
        }
        .btn-download.active:hover { background-color: #27ae60; }
        .btn-download.active:active { transform: scale(0.98); }
        .loading { background-color: #e67e22 !important; cursor: wait !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔍 고화질 이미지 보정 확대기</h2>
        
        <div class="warning-box">
            <strong>✨ 란초스(Lanczos-3) 알고리즘 엔진 탑재</strong><br>
            외부 라이브러리 로딩 없이 브라우저 자체 연산으로 0초 만에 실행됩니다. 단순 픽셀 확대로 인한 흐려짐을 상쇄하고 외곽선을 또렷하게 보정합니다.
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 클릭하여 이미지 선택</span>
            <span class="upload-sub">(또는 파일을 여기로 끌어다 놓으세요)</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="settings" id="settingsArea">
            <div class="setting-group">
                <label>확대 배율 선택</label>
                <select id="scaleSelect">
                    <option value="2">2배 확대 (200%)</option>
                    <option value="4" selected>4배 확대 (400%)</option>
                    <option value="8">8배 확대 (800%)</option>
                </select>
            </div>
        </div>

        <div class="preview-container" id="previewArea">
            <label style="font-weight: bold; color: #2c3e50;">원본 미리보기</label><br><br>
            <img id="previewImg" src="" alt="미리보기">
            <div class="info-text" id="resolutionInfo"></div>
        </div>

        <button class="btn-download" id="downloadBtn" disabled>이미지를 먼저 등록해주세요</button>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const scaleSelect = document.getElementById('scaleSelect');
        const previewImg = document.getElementById('previewImg');
        const resolutionInfo = document.getElementById('resolutionInfo');

        let originalImg = new Image();
        let originalFileName = '';

        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            originalFileName = file.name.split('.')[0];
            
            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                originalImg.src = event.target.result;
                
                originalImg.onload = function() {
                    previewArea.style.display = 'block';
                    downloadBtn.disabled = false;
                    downloadBtn.classList.remove('loading');
                    downloadBtn.classList.add('active');
                    downloadBtn.innerText = '고화질 복원 및 다운로드';
                    updateInfo();
                }
            };
            reader.readAsDataURL(file);
        }

        imageInput.addEventListener('change', function(e) { 
            if(e.target.files.length > 0) processFile(e.target.files[0]); 
        });
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                imageInput.files = e.dataTransfer.files;
                processFile(e.dataTransfer.files[0]);
            }
        });

        scaleSelect.addEventListener('change', updateInfo);

        function updateInfo() {
            if (!originalImg.src) return;
            const scale = parseInt(scaleSelect.value);
            resolutionInfo.innerHTML = `원본: ${originalImg.width} x ${originalImg.height}px <br> <strong>변환 후 예상: <span style="color:#2980b9">${originalImg.width * scale} x ${originalImg.height * scale}px</span></strong>`;
        }

        // 고화질 란초스(Lanczos-3) 리사이징 기법 구현 함수
        function lanczosCreate(lobes) {
            return function(x) {
                if (x === 0) return 1;
                if (x <= -lobes || x >= lobes) return 0;
                const piX = x * Math.PI;
                return (lobes * Math.sin(piX) * Math.sin(piX / lobes)) / (piX * piX);
            };
        }

        function resizeLanczos(img, scale) {
            const srcW = img.width;
            const srcH = img.height;
            const dstW = srcW * scale;
            const dstH = srcH * scale;

            const srcCanvas = document.createElement('canvas');
            srcCanvas.width = srcW;
            srcCanvas.height = srcH;
            const srcCtx = srcCanvas.getContext('2d');
            srcCtx.drawImage(img, 0, 0);
            const srcData = srcCtx.getImageData(0, 0, srcW, srcH).data;

            const dstCanvas = document.createElement('canvas');
            dstCanvas.width = dstW;
            dstCanvas.height = dstH;
            const dstCtx = dstCanvas.getContext('2d');
            const dstImgData = dstCtx.createImageData(dstW, dstH);
            const dstData = dstImgData.data;

            const lobes = 3;
            const lanczos = lanczosCreate(lobes);

            for (let y = 0; y < dstH; y++) {
                const srcY = (y + 0.5) / scale - 0.5;
                const iY = Math.floor(srcY);
                for (let x = 0; x < dstW; x++) {
                    const srcX = (x + 0.5) / scale - 0.5;
                    const iX = Math.floor(srcX);

                    let r = 0, g = 0, b = 0, a = 0;
                    let weightSum = 0;

                    for (let j = iY - lobes + 1; j <= iY + lobes; j++) {
                        if (j < 0 || j >= srcH) continue;
                        const weightY = lanczos(srcY - j);
                        for (let i = iX - lobes + 1; i <= iX + lobes; i++) {
                            if (i < 0 || i >= srcW) continue;
                            const weightX = lanczos(srcX - i);
                            const weight = weightX * weightY;

                            if (weight > 0) {
                                const srcIdx = (j * srcW + i) * 4;
                                r += srcData[srcIdx] * weight;
                                g += srcData[srcIdx + 1] * weight;
                                b += srcData[srcIdx + 2] * weight;
                                a += srcData[srcIdx + 3] * weight;
                                weightSum += weight;
                            }
                        }
                    }

                    const dstIdx = (y * dstW + x) * 4;
                    dstData[dstIdx] = r / weightSum;
                    dstData[dstIdx + 1] = g / weightSum;
                    dstData[dstIdx + 2] = b / weightSum;
                    dstData[dstIdx + 3] = a / weightSum;
                }
            }
            dstCtx.putImageData(dstImgData, 0, 0);
            return dstCanvas.toDataURL('image/png');
        }

        downloadBtn.addEventListener('click', function() {
            if (!originalImg.src || this.disabled) return;
            const scale = parseInt(scaleSelect.value);
            
            try {
                downloadBtn.classList.add('loading');
                downloadBtn.innerText = '⚡ 고급 픽셀 보정 연산 중...';
                
                // 의존성 없는 네이티브 고화질 연산 프로세스 실행
                setTimeout(() => {
                    const upscaledDataUrl = resizeLanczos(originalImg, scale);

                    const link = document.createElement('a');
                    link.download = `${originalFileName}_HighRes_${scale}x.png`;
                    link.href = upscaledDataUrl;
                    link.click();

                    downloadBtn.classList.remove('loading');
                    downloadBtn.innerText = '고화질 복원 및 다운로드';
                }, 50);

            } catch (error) {
                console.error(error);
                alert("연산 중 오류가 발생했습니다.");
                downloadBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
