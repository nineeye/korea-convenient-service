<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자수 세기 & 대소문자 변환기</title>
    <style>
        /* 기본 리셋 및 폰트 설정 */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        /* 메인 컨테이너 스타일 */
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 700px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        
        /* 텍스트 입력창 스타일 */
        textarea { 
            width: 100%; 
            height: 250px; 
            padding: 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 16px; 
            line-height: 1.5;
            resize: vertical; 
            margin-bottom: 20px; 
            transition: border-color 0.3s ease;
        }
        textarea:focus { 
            outline: none; 
            border-color: #3498db; 
        }

        /* 통계 패널 스타일 */
        .stats { 
            display: flex; 
            justify-content: space-between; 
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #e2e8f0;
        }
        .stat-box { 
            text-align: center; 
            width: 33%; 
            font-size: 14px; 
            color: #64748b; 
            font-weight: 600;
        }
        .stat-value { 
            display: block; 
            font-size: 28px; 
            color: #2c3e50; 
            margin-top: 8px; 
            font-weight: 700;
        }

        /* 버튼 영역 스타일 */
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        button { 
            flex: 1; 
            min-width: 120px;
            padding: 12px 15px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            transition: all 0.2s ease; 
        }
        button:active { transform: scale(0.98); }
        
        /* 버튼 색상 */
        .btn-blue { background: #3498db; color: white; }
        .btn-blue:hover { background: #2980b9; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-green:hover { background: #27ae60; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-red:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="container">
        <h2>텍스트 유틸리티 도구</h2>
        <textarea id="textInput" placeholder="여기에 글자를 입력하거나 붙여넣기 하세요..."></textarea>
        
        <div class="stats">
            <div class="stat-box">
                공백 포함
                <span class="stat-value" id="countAll">0</span>
            </div>
            <div class="stat-box" style="border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;">
                공백 제외
                <span class="stat-value" id="countNoSpace">0</span>
            </div>
            <div class="stat-box">
                바이트 (Byte)
                <span class="stat-value" id="countByte">0</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-blue" onclick="convertUpper()">대문자로</button>
            <button class="btn-blue" onclick="convertLower()">소문자로</button>
            <button class="btn-green" onclick="copyResult()">결과 복사</button>
            <button class="btn-red" onclick="clearAll()">지우기</button>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const countAll = document.getElementById('countAll');
        const countNoSpace = document.getElementById('countNoSpace');
        const countByte = document.getElementById('countByte');

        // 입력창에 타이핑이 일어날 때마다 실시간으로 글자수 계산 함수 실행
        textInput.addEventListener('input', calculateText);

        // 글자수 및 바이트 계산 메인 함수
        function calculateText() {
            const text = textInput.value;
            
            // 1. 공백 포함 글자수
            countAll.innerText = text.length;
            
            // 2. 공백 제외 글자수 (모든 띄어쓰기, 줄바꿈 제거 후 길이 측정)
            countNoSpace.innerText = text.replace(/[\s]/g, '').length;
            
            // 3. 바이트 수 계산 (웹 표준인 UTF-8 기준)
            // 한글은 3바이트, 영문/숫자/기본 기호는 1바이트로 정확히 계산됩니다.
            countByte.innerText = new TextEncoder().encode(text).length;
        }

        // 대문자 변환 함수
        function convertUpper() {
            textInput.value = textInput.value.toUpperCase();
            calculateText(); // 변환 후 바이트 수가 달라질 수 있으므로 재계산
        }

        // 소문자 변환 함수
        function convertLower() {
            textInput.value = textInput.value.toLowerCase();
            calculateText();
        }

        // 결과 복사 함수 (클립보드 API 사용)
        function copyResult() {
            const text = textInput.value;
            if (text.trim() === '') {
                alert('복사할 텍스트가 없습니다.');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                alert('텍스트가 클립보드에 복사되었습니다.');
            }).catch(err => {
                alert('복사에 실패했습니다: ' + err);
            });
        }

        // 전체 지우기 함수
        function clearAll() {
            textInput.value = '';
            calculateText();
            textInput.focus(); // 지운 후 바로 타이핑할 수 있게 커서 활성화
        }
    </script>

</body>
</html>
