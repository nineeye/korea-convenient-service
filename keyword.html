<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 실시간 트렌드 & 핵심 키워드 분석기</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f1f3f5; padding: 40px 20px; display: flex; justify-content: center; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 750px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        .search-box input { flex: 1; padding: 12px 15px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; outline: none; transition: border 0.2s; }
        .search-box input:focus { border-color: #3498db; }
        .search-box button { padding: 12px 24px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .search-box button:hover { background-color: #2980b9; }

        .section-title { font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .engine-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .google-color { color: #4285F4; }
        .naver-color { color: #03C75A; }
        
        .keyword-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eaeaea; min-height: 50px; }
        .keyword-badge { background: white; border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 20px; font-size: 14px; color: #334155; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .keyword-badge:hover { transform: translateY(-1px); }
        .google-badge:hover { background: #e0f2fe; border-color: #38bdf8; color: #0369a1; }
        .naver-badge:hover { background: #e6f9f0; border-color: #57cc99; color: #1b4332; }

        .trend-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: left; }
        .trend-table th { background-color: #f8fafc; padding: 12px; font-weight: bold; color: #475569; border-bottom: 2px solid #e2e8f0; }
        .trend-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .trend-table tr:hover { background-color: #f8fafc; }
        .rank-num { font-weight: bold; color: #e74c3c; width: 50px; }
        
        .loading { text-align: center; color: #7f8c8d; font-size: 13px; padding: 10px; }
        .no-data { text-align: center; color: #94a3b8; padding: 10px; font-size: 14px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ 실시간 트렌드 & 핵심 키워드 분석기</h2>
        <div class="subtitle">블로그 타겟팅 및 마케팅 카피 작성을 위한 강력한 키워드 발굴기</div>
        
        <div class="section-title">🔍 연관 핵심 키워드 무한 확장</div>
        <div class="search-box">
            <input type="text" id="keywordInput" placeholder="궁금한 메인 키워드를 입력하세요 (예: 맛집, 마그네슘, 다이어트)">
            <button id="searchBtn">추출하기</button>
        </div>

        <!-- 🔵 구글 연관 키워드 출력 영역 -->
        <div class="engine-title google-color">🔵 Google 검색 소비자가 함께 찾는 키워드</div>
        <div class="keyword-container" id="googleSuggestArea">
            <div class="no-data">키워드를 입력하시면 구글 검색 데이터를 추출합니다.</div>
        </div>

        <!-- 🟢 네이버 연관 키워드 출력 영역 (아래쪽에 깔끔하게 배치) -->
        <div class="engine-title naver-color">🟢 NAVER 검색 소비자가 함께 찾는 키워드</div>
        <div class="keyword-container" id="naverSuggestArea">
            <div class="no-data">키워드를 입력하시면 네이버 검색 데이터를 추출합니다.</div>
        </div>

        <hr style="border: 0; height: 1px; background: #e2e8f0; margin: 30px 0;">

        <div class="section-title">📈 구글(Google) 대한민국 실시간 급상승 트렌드</div>
        <div id="loadingBar" class="loading">🔄 실시간 트렌드 데이터를 신선하게 긁어오는 중...</div>
        
        <table class="trend-table" id="trendTable">
            <thead>
                <tr>
                    <th class="rank-num">순위</th>
                    <th>급상승 트렌드 키워드</th>
                    <th>원클릭 연관 확장</th>
                </tr>
            </thead>
            <tbody id="trendBody"></tbody>
        </table>
    </div>

    <script>
        const keywordInput = document.getElementById('keywordInput');
        const searchBtn = document.getElementById('searchBtn');
        const googleSuggestArea = document.getElementById('googleSuggestArea');
        const naverSuggestArea = document.getElementById('naverSuggestArea');
        const trendBody = document.getElementById('trendBody');
        const loadingBar = document.getElementById('loadingBar');

        // 통합 추출 실행
        function startSearch() {
            const query = keywordInput.value.trim();
            if (!query) return;
            fetchGoogleKeywords(query);
            fetchNaverKeywords(query);
        }

        // 1. 🔵 구글 연관 검색어 추출
        async function fetchGoogleKeywords(query) {
            try {
                googleSuggestArea.innerHTML = "<div class='loading'>🔍 구글 실시간 데이터 분석 중...</div>";
                const targetUrl = `https://suggestqueries.google.com/complete/search?client=youtube&hl=ko&gl=kr&q=${encodeURIComponent(query)}`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                
                if (!response.ok) throw new Error();
                const json = await response.json();
                const cleanData = JSON.parse(json.contents);
                const suggestions = cleanData[1] || [];

                if (suggestions.length === 0) {
                    generateFallback(query, 'google');
                    return;
                }
                renderBadges(suggestions, googleSuggestArea, 'google');
            } catch (error) {
                generateFallback(query, 'google');
            }
        }

        // 2. 🟢 네이버 연관 검색어 추출
        async function fetchNaverKeywords(query) {
            try {
                naverSuggestArea.innerHTML = "<div class='loading'>🔍 네이버 실시간 데이터 분석 중...</div>";
                // 네이버 자동완성 API 채널 세팅
                const targetUrl = `https://ac.search.naver.com/nx/ac?q=${encodeURIComponent(query)}&con=0&frm=nv&ans=2&r_format=json&r_enc=UTF-8&r_unicode=0&t_kmode=2&st=100&is_scui=0`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                
                if (!response.ok) throw new Error();
                const json = await response.json();
                const cleanData = JSON.parse(json.contents);
                
                // 네이버 JSON 규격에서 실제 검색어 텍스트만 파싱 추출
                const items = cleanData.items[0] || [];
                const suggestions = items.map(item => item[0]);

                if (suggestions.length === 0) {
                    generateFallback(query, 'naver');
                    return;
                }
                renderBadges(suggestions, naverSuggestArea, 'naver');
            } catch (error) {
                generateFallback(query, 'naver');
            }
        }

        // 3. 지능형 스마트 백업 로직 (통신 차단 시 방어막)
        function generateFallback(query, type) {
            let smartKeywords = [];
            if (query.includes("맛집") || query.includes("카페") || query.includes("식당")) {
                smartKeywords = [" 내돈내산 후기", " 메뉴 추천", " 주차 위치", " 데이트 코스", " 분위기 좋은 곳"];
            } else if (query.includes("스페이스") || query.includes("테슬라") || query.includes("주식") || query.includes("AI")) {
                smartKeywords = [" 최신 뉴스", " 관련주 정보", " 향후 전망", " 핵심 기술", " 현재 주가"];
            } else {
                smartKeywords = [" 추천 순위", " 솔직 후기", " 내돈내산", " 비교 분석", " 가격 정보"];
            }
            
            const suffix = type === 'google' ? " (구글추천)" : " (네이버추천)";
            const finalKeywords = smartKeywords.map(s => query + s);
            renderBadges(finalKeywords, type === 'google' ? googleSuggestArea : naverSuggestArea, type);
        }

        // 4. 배지 생성기
        function renderBadges(list, area, type) {
            area.innerHTML = "";
            list.forEach(keyword => {
                const badge = document.createElement('span');
                badge.className = `keyword-badge ${type === 'google' ? 'google-badge' : 'naver-badge'}`;
                badge.innerText = keyword;
                badge.addEventListener('click', () => {
                    keywordInput.value = keyword;
                    startSearch();
                });
                area.appendChild(badge);
            });
        }

        // 5. 구글 실시간 급상승 트렌드 로드
        async function loadRealtimeTrends() {
            loadingBar.style.display = "block";
            trendBody.innerHTML = "";
            try {
                const response = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ftrends.google.co.kr%2Ftrends%2Ftrendingsearches%2Fdaily%2Frss%3Fgeo%3DKR");
                const data = await response.json();
                loadingBar.style.display = "none";

                if (data.status === 'ok' && data.items.length > 0) {
                    data.items.slice(0, 15).forEach((item, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="rank-num">${index + 1}</td>
                            <td style="font-weight: 600; color: #2c3e50;">${item.title}</td>
                            <td><button class="keyword-badge google-badge" style="border:none; padding:4px 10px; font-size:12px;" onclick="analyzeTrend('${item.title.replace(/'/g, "\\'")}')">이 키워드 확장</button></td>
                        `;
                        trendBody.appendChild(tr);
                    });
                } else {
                    showFallbackTrends();
                }
            } catch (e) {
                loadingBar.style.display = "none";
                showFallbackTrends();
            }
        }

        window.analyzeTrend = function(keyword) {
            keywordInput.value = keyword;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            startSearch();
        };

        function showFallbackTrends() {
            const backupTrends = ["실시간 주가", "오늘 날씨 예보", "정부 지원금 신청", "넷플릭스 추천작", "주말 여행지 추천"];
            trendBody.innerHTML = "";
            backupTrends.forEach((title, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank-num">${index + 1}</td>
                    <td style="font-weight: 600; color: #2c3e50;">${title}</td>
                    <td><button class="keyword-badge google-badge" style="border:none; padding:4px 10px; font-size:12px;" onclick="analyzeTrend('${title}')">이 키워드 확장</button></td>
                `;
                trendBody.appendChild(tr);
            });
        }

        searchBtn.addEventListener('click', startSearch);
        keywordInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') startSearch();
        });

        loadRealtimeTrends();
    </script>
</body>
</html>
