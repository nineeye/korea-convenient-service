<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 실시간 트렌드 & 핵심 키워드 분석기</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f1f3f5; padding: 40px 20px; display: flex; justify-content: center; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 700px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        .search-box input { flex: 1; padding: 12px 15px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; outline: none; transition: border 0.2s; }
        .search-box input:focus { border-color: #3498db; }
        .search-box button { padding: 12px 24px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .search-box button:hover { background-color: #2980b9; }

        .section-title { font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }
        
        .keyword-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eaeaea; min-height: 50px; }
        .keyword-badge { background: white; border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 20px; font-size: 14px; color: #334155; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .keyword-badge:hover { background: #e0f2fe; border-color: #38bdf8; color: #0369a1; transform: translateY(-1px); }

        .trend-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: left; }
        .trend-table th { background-color: #f8fafc; padding: 12px; font-weight: bold; color: #475569; border-bottom: 2px solid #e2e8f0; }
        .trend-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .trend-table tr:hover { background-color: #f8fafc; }
        .rank-num { font-weight: bold; color: #e74c3c; width: 50px; }
        
        .loading { text-align: center; color: #7f8c8d; font-size: 14px; padding: 20px; display: none; }
        .no-data { text-align: center; color: #94a3b8; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ 실시간 트렌드 & 핵심 키워드 분석기</h2>
        <div class="subtitle">블로그 타겟팅 및 마케팅 카피 작성을 위한 강력한 키워드 발굴기</div>
        
        <div class="section-title">🔍 연관 핵심 키워드 무한 확장</div>
        <div class="search-box">
            <input type="text" id="keywordInput" placeholder="궁금한 메인 키워드를 입력하세요 (예: 맛집, 마그네슘, 다이어트)">
            <button id="searchBtn">추출하기</button>
        </div>

        <div class="keyword-container" id="suggestArea">
            <div class="no-data" id="suggestEmpty">키워드를 입력하시면 소비자들이 함께 검색하는 연관 단어를 추출해 드립니다.</div>
        </div>

        <hr style="border: 0; height: 1px; background: #e2e8f0; margin: 30px 0;">

        <div class="section-title">📈 구글(Google) 대한민국 실시간 급상승 트렌드</div>
        <div class="loading" id="loadingBar">🔄 실시간 트렌드 데이터를 신선하게 긁어오는 중...</div>
        
        <table class="trend-table" id="trendTable">
            <thead>
                <tr>
                    <th class="rank-num">순위</th>
                    <th>급상승 트렌드 키워드</th>
                    <th>원클릭 연관 확장</th>
                </tr>
            </thead>
            <tbody id="trendBody"></tbody>
        </table>
    </div>

    <script>
        const keywordInput = document.getElementById('keywordInput');
        const searchBtn = document.getElementById('searchBtn');
        const suggestArea = document.getElementById('suggestArea');
        const trendBody = document.getElementById('trendBody');
        const loadingBar = document.getElementById('loadingBar');

        // 1. 메인 검색 추출 엔진
        async function fetchKeywords(query) {
            if (!query.trim()) return;
            
            try {
                suggestArea.innerHTML = "🔍 실시간 검색망 분석 중...";
                
                // 프록시 서버 안정성을 높이기 위해, 다른 오픈 프록시(allorigins) 채널로 연동 변경
                const targetUrl = `https://suggestqueries.google.com/complete/search?client=youtube&hl=ko&gl=kr&q=${encodeURIComponent(query)}`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                
                if (!response.ok) throw new Error("네트워크 지연");
                
                const json = await response.json();
                // 텍스트 형태로 들어온 자동완성 데이터를 배열로 변환
                const cleanData = JSON.parse(json.contents);
                const suggestions = cleanData[1] || [];

                if (suggestions.length === 0) {
                    generateSmartFallback(query);
                    return;
                }

                renderBadges(suggestions);

            } catch (error) {
                // 통신 장애 혹은 프록시 먹통 시 마케팅 최적화 가상 필터 발동
                generateSmartFallback(query);
            }
        }

        // 2. 💡 단어 성격에 맞게 매칭되는 '마케터용 스마트 백업 로직'
        function generateSmartFallback(query) {
            let smartKeywords = [];
            
            // 입력된 단어에 '맛집', '카페', '여행', '위치' 등이 포함된 경우 (지역/장소성)
            if (query.includes("맛집") || query.includes("카페") || query.includes("핫플") || query.includes("식당")) {
                smartKeywords = [" 주위 가볼만한곳", " 내돈내산 후기", " 메뉴 추천", " 주차장 위치", " 웨이팅 꿀팁", " 분위기 좋은 곳", " 리얼 리뷰", " 데이트 코스"];
            } 
            // IT, 지식, 기업, 테크 단어인 경우 (정보성)
            else if (query.includes("스페이스") || query.includes("테슬라") || query.includes("주식") || query.includes("AI") || query.includes("투자")) {
                smartKeywords = [" 최신 뉴스", " 관련주 정보", " 현재 주가", " 향후 전망", " 출시일 일정", " 핵심 기술", " 창업자 이야기", " 실적 발표"];
            }
            // 영양제, 건강, 식품, 제품 관련 (리뷰/마케팅성)
            else {
                smartKeywords = [" 추천 순위", " 솔직 후기", " 내돈내산", " 비교 분석", " 사용 방법", " 가성비 제품", " 싸게 사는 법", " 특징 정리"];
            }

            // 입력한 검색어와 스마트 키워드 결합
            const finalKeywords = smartKeywords.map(suffix => query + suffix);
            renderBadges(finalKeywords);
        }

        // 3. 화면에 태그 배지 뿌려주는 함수
        function renderBadges(list) {
            suggestArea.innerHTML = "";
            list.forEach(keyword => {
                const badge = document.createElement('span');
                badge.className = 'keyword-badge';
                badge.innerText = keyword;
                badge.addEventListener('click', () => {
                    keywordInput.value = keyword;
                    fetchKeywords(keyword);
                });
                suggestArea.appendChild(badge);
            });
        }

        // 4. 대한민국 실시간 급상승 검색어 로드
        async function loadRealtimeTrends() {
            loadingBar.style.display = "block";
            trendBody.innerHTML = "";
            
            try {
                const response = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ftrends.google.co.kr%2Ftrends%2Ftrendingsearches%2Fdaily%2Frss%3Fgeo%3DKR");
                const data = await response.json();
                
                loadingBar.style.display = "none";

                if (data.status === 'ok' && data.items.length > 0) {
                    data.items.slice(0, 15).forEach((item, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="rank-num">${index + 1}</td>
                            <td style="font-weight: 600; color: #2c3e50;">${item.title}</td>
                            <td><button class="keyword-badge" style="background:#3498db; color:white; border:none; padding:4px 10px; font-size:12px;" onclick="analyzeTrend('${item.title.replace(/'/g, "\\'")}')">이 키워드 확장</button></td>
                        `;
                        trendBody.appendChild(tr);
                    });
                } else {
                    showFallbackTrends();
                }
            } catch (e) {
                loadingBar.style.display = "none";
                showFallbackTrends();
            }
        }

        window.analyzeTrend = function(keyword) {
            keywordInput.value = keyword;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchKeywords(keyword);
        };

        function showFallbackTrends() {
            const backupTrends = ["실시간 주가", "오늘 날씨 예보", "유튜브 프리미엄 우회", "정부 지원금 신청", "넷플릭스 추천작", "주말 여행지", "MBTI 무료 검사", "환율 조회"];
            trendBody.innerHTML = "";
            backupTrends.forEach((title, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank-num">${index + 1}</td>
                    <td style="font-weight: 600; color: #2c3e50;">${title}</td>
                    <td><button class="keyword-badge" style="background:#3498db; color:white; border:none; padding:4px 10px; font-size:12px;" onclick="analyzeTrend('${title}')">이 키워드 확장</button></td>
                `;
                trendBody.appendChild(tr);
            });
        }

        searchBtn.addEventListener('click', () => fetchKeywords(keywordInput.value));
        keywordInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') fetchKeywords(keywordInput.value);
        });

        loadRealtimeTrends();
    </script>
</body>
</html>
