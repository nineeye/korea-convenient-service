<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>판매자 데이터 수집기 V3</title>
<style>
body{font-family:Arial,sans-serif;max-width:1200px;margin:20px auto;padding:20px}
input[type=text],textarea{width:100%;padding:10px;box-sizing:border-box}
textarea{height:260px}
button{padding:10px 14px;margin:4px}
.card{border:1px solid #ddd;padding:15px;margin-top:15px}
.list{border:1px solid #eee;padding:10px;max-height:250px;overflow:auto;white-space:pre-wrap}
.good{color:green;font-weight:bold}.mid{color:orange;font-weight:bold}.bad{color:red;font-weight:bold}
</style>
</head>
<body>
<h1>📦 판매자 데이터 수집기 V3</h1>

<label>카테고리명</label>
<input id="category" type="text" placeholder="예: 유산균">

<label>기존 JSON 불러오기</label>
<input id="jsonFile" type="file">
<button onclick="loadJSON()">JSON 불러오기</button>

<hr>

<label>상품명 붙여넣기</label>
<textarea id="titles"></textarea>

<button onclick="processData()">중복 제거 미리보기</button>
<button onclick="updateDB()">DB 업데이트</button>
<button onclick="downloadJSON()">JSON 저장</button>
<button onclick="downloadTXT()">TXT 저장</button>
<button onclick="downloadNewItems()">신규상품 저장</button>

<div class="card">
<h3>DB 상태</h3>
<p>기존 상품 수 : <span id="oldCount">0</span></p>
<p>입력 상품 수 : <span id="inputCount">0</span></p>
<p>신규 상품 수 : <span id="newCount">0</span></p>
<p>중복 상품 수 : <span id="dupCount">0</span></p>
<p>최종 상품 수 : <span id="finalCount">0</span></p>
<p>신규율 : <span id="newRate">0%</span> <span id="rateGrade"></span></p>
</div>

<div class="card">
<h3>🟢 신규 상품</h3>
<div id="newItems" class="list"></div>
</div>

<div class="card">
<h3>🔴 중복 상품</h3>
<div id="duplicateItems" class="list"></div>
</div>

<div class="card">
<h3>전체 DB</h3>
<p>상품 수 : <span id="count">0</span></p>
<div id="output" class="list"></div>
</div>

<script>
let existingDB=[];
let cleanedTitles=[];
let newItems=[];
let duplicateItems=[];

function normalizeTitle(title){
 return title
 .replace(/,\s*\d+개$/,'')
 .replace(/\s*\d+개$/,'')
 .replace(/\s*\d+상자$/,'')
 .replace(/\s*\d+박스$/,'')
 .trim();
}

function processData(){
 const raw=document.getElementById('titles').value;
 const rows=raw.split('\\n').map(v=>normalizeTitle(v.trim())).filter(Boolean);
 cleanedTitles=[...new Set(rows)];
 document.getElementById('count').innerText=cleanedTitles.length;
 document.getElementById('output').innerText=cleanedTitles.join('\\n');
}

function loadJSON(){
 const file=document.getElementById('jsonFile').files[0];
 if(!file){alert('파일 선택');return;}
 const reader=new FileReader();
 reader.onload=(e)=>{
  try{
   const data=JSON.parse(e.target.result);
   existingDB=data.titles||[];
   document.getElementById('oldCount').innerText=existingDB.length;
   alert(existingDB.length+'개 로드 완료');
  }catch(err){alert('JSON 오류');}
 };
 reader.readAsText(file);
}

function updateDB(){
 const raw=document.getElementById('titles').value;
 const input=[...new Set(raw.split('\\n').map(v=>normalizeTitle(v.trim())).filter(Boolean))];

 const oldSet=new Set(existingDB);
 newItems=[]; duplicateItems=[];

 input.forEach(t=> oldSet.has(t) ? duplicateItems.push(t) : newItems.push(t));

 cleanedTitles=[...existingDB,...newItems];

 const rate=input.length?((newItems.length/input.length)*100).toFixed(2):"0.00";

 document.getElementById('inputCount').innerText=input.length;
 document.getElementById('newCount').innerText=newItems.length;
 document.getElementById('dupCount').innerText=duplicateItems.length;
 document.getElementById('finalCount').innerText=cleanedTitles.length;
 document.getElementById('count').innerText=cleanedTitles.length;
 document.getElementById('newRate').innerText=rate+'%';

 const g=document.getElementById('rateGrade');
 if(parseFloat(rate)<5){g.className='bad';g.textContent='🔴 많이 수집됨';}
 else if(parseFloat(rate)<15){g.className='mid';g.textContent='🟡 보통';}
 else {g.className='good';g.textContent='🟢 신규 많음';}

 document.getElementById('newItems').innerText=newItems.join('\\n');
 document.getElementById('duplicateItems').innerText=duplicateItems.join('\\n');
 document.getElementById('output').innerText=cleanedTitles.join('\\n');
}

function saveText(filename,text){
 const blob=new Blob([text],{type:'text/plain'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download=filename;
 a.click();
}

function downloadJSON(){
 if(!cleanedTitles.length){alert('데이터 없음');return;}
 const category=document.getElementById('category').value||'미분류';
 const data={category,count:cleanedTitles.length,updated:new Date().toISOString(),titles:cleanedTitles};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download=category+'.json';
 a.click();
}

function downloadTXT(){
 if(!cleanedTitles.length){alert('데이터 없음');return;}
 const category=document.getElementById('category').value||'미분류';
 saveText(category+'.txt',cleanedTitles.join('\\n'));
}

function downloadNewItems(){
 if(!newItems.length){alert('신규 상품 없음');return;}
 const category=document.getElementById('category').value||'미분류';
 saveText(category+'_신규상품.txt',newItems.join('\\n'));
}
</script>
</body>
</html>
