<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 쇼핑몰 마진 계산기 (수수료·택배·광고·세금 완벽 방어)</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .calc-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .margin-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        .input-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-item label {
            font-size: 13px;
            color: #475569;
            font-weight: 600;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input {
            width: 100%;
            padding: 10px 30px 10px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            text-align: right;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }
        .unit {
            position: absolute;
            right: 10px;
            font-size: 14px;
            color: #94a3b8;
            pointer-events: none;
        }
        .result-box {
            background: white;
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            color: #1e293b;
            line-height: 1.7;
            border: 1px solid #bbf7d0;
        }
        .highlight {
            font-weight: bold;
            color: #16a34a;
            font-size: 18px;
        }
        .breakdown {
            font-size: 13px;
            color: #64748b;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e1;
        }
        .info-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            background: rgba(0,0,0,0.02);
            padding: 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>📈 끝판왕 쇼핑몰 마진 계산기</h2>

    <div class="calc-section margin-box">
        <div class="grid-inputs">
            <div class="input-item">
                <label>① 제품 원가 (필수)</label>
                <div class="input-wrapper">
                    <input type="number" id="mCost" placeholder="10000" oninput="calcUltimateMargin()">
                    <span class="unit">원</span>
                </div>
            </div>
            <div class="input-item">
                <label>② 목표 마진율 (필수)</label>
                <div class="input-wrapper">
                    <input type="number" id="mMargin" placeholder="30" oninput="calcUltimateMargin()">
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="input-item">
                <label>③ 마켓 수수료</label>
                <div class="input-wrapper">
                    <input type="number" id="mFee" placeholder="10" oninput="calcUltimateMargin()">
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="input-item">
                <label>④ 예상 세금 (부가세 등)</label>
                <div class="input-wrapper">
                    <input type="number" id="mTax" placeholder="10" oninput="calcUltimateMargin()">
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="input-item">
                <label>⑤ 소비자 택배비 (판매자 부담분)</label>
                <div class="input-wrapper">
                    <input type="number" id="mShipping" placeholder="3000" oninput="calcUltimateMargin()">
                    <span class="unit">원</span>
                </div>
            </div>
            <div class="input-item">
                <label>⑥ 개당 전환 광고비 (예상)</label>
                <div class="input-wrapper">
                    <input type="number" id="mAd" placeholder="1500" oninput="calcUltimateMargin()">
                    <span class="unit">원</span>
                </div>
            </div>
        </div>
        
        <div class="result-box" id="ultimateResult">
            원가와 목표 마진을 입력하시면 실시간 역산이 시작됩니다.
        </div>
    </div>
</div>

<script>
    function formatNum(num) {
        if(isNaN(num) || !isFinite(num)) return "0";
        return Math.round(num).toLocaleString('ko-KR');
    }

    function calcUltimateMargin() {
        // 필수 값 (없으면 계산 안 함)
        const cost = parseFloat(document.getElementById('mCost').value);
        const marginRate = parseFloat(document.getElementById('mMargin').value);
        
        // 선택 값 (빈칸이거나 지우면 자동으로 0원 / 0% 처리!)
        const feeRate = parseFloat(document.getElementById('mFee').value) || 0;
        const taxRate = parseFloat(document.getElementById('mTax').value) || 0;
        const shipping = parseFloat(document.getElementById('mShipping').value) || 0;
        const adCost = parseFloat(document.getElementById('mAd').value) || 0;

        const resultDiv = document.getElementById('ultimateResult');

        if (!cost || isNaN(marginRate)) {
            resultDiv.innerHTML = "💡 <b>원가</b>와 <b>목표 마진율</b>을 입력하면 정밀 계산이 시작됩니다.";
            return;
        }

        // 비율 항목의 총합이 100%를 넘으면 수학적으로 판매가 계산 불가 경고
        const totalPercent = marginRate + feeRate + taxRate;
        if (totalPercent >= 100) {
            resultDiv.innerHTML = "<span style='color:red; font-weight:bold;'>[오류] 마진+수수료+세금의 합이 100% 이상일 수 없습니다. 비율을 조정해 주세요.</span>";
            return;
        }

        // 🧮 끝판왕 수수료/비용 방어 역산 공식
        // 판매가 = (원가 + 택배비 + 광고비) / (1 - (마진율 + 수수료율 + 세금율) / 100)
        const sellPrice = (cost + shipping + adCost) / (1 - (totalPercent / 100));
        
        // 각각의 지출 금액 계산
        const feeAmount = sellPrice * (feeRate / 100);
        const taxAmount = sellPrice * (taxRate / 100);
        const netProfit = sellPrice * (marginRate / 100); // 사장님이 설정한 마진율대로 정확히 정산됨

        resultDiv.innerHTML = `
            🎯 <b>최종 추천 판매가:</b> <span class="highlight">${formatNum(sellPrice)}원</span>
            <div class="info-text">※ 고정비(택배/광고)를 건지고 비율비용(수수료/세금)을 방어하면서, 사장님 통장에는 판매가의 정확히 <b>${marginRate}%(${formatNum(netProfit)}원)</b>가 남는 마법의 가격입니다.</div>
            
            <div class="breakdown">
                <b>[지출 및 정산 브레이크다운]</b><br>
                • <b>제품 원가:</b> ${formatNum(cost)}원<br>
                • <b>마켓 수수료 (${feeRate}%):</b> ${formatNum(feeAmount)}원<br>
                • <b>예상 세금 (${taxRate}%):</b> ${formatNum(taxAmount)}원<br>
                • <b>판매자 부담 택배비:</b> ${formatNum(shipping)}원<br>
                • <b>개당 광고 비용:</b> ${formatNum(adCost)}원<br>
                <span style="color:#16a34a; font-weight:bold;">• 최종 순수익 (내 몫): ${formatNum(netProfit)}원</span>
            </div>
        `;
    }
</script>

</body>
</html>
