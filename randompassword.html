<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강력한 무작위 비밀번호 생성기</title>
    <style>
        /* 기본 리셋 및 폰트 설정 (첫 번째 도구와 디자인 통일) */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 500px; 
        }
        
        h2 { margin-top: 0; color: #2c3e50; margin-bottom: 20px; font-size: 24px; text-align: center; }
        
        /* 비밀번호 표시 영역 */
        .result-box { 
            background: #f8fafc; 
            border: 2px dashed #cbd5e1; 
            border-radius: 8px; 
            padding: 20px; 
            text-align: center; 
            margin-bottom: 25px; 
            word-break: break-all;
        }
        #passwordDisplay { 
            font-size: 24px; 
            font-weight: bold; 
            color: #0f172a; 
            letter-spacing: 2px; 
        }
        
        /* 옵션 설정 영역 */
        .options { margin-bottom: 25px; }
        .option-group { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .option-group label { font-size: 16px; color: #475569; cursor: pointer; }
        
        /* 슬라이더 스타일 */
        input[type="range"] { 
            width: 100%; 
            margin-top: 10px; 
            cursor: pointer; 
        }
        .length-val { font-weight: bold; color: #3498db; font-size: 18px; }
        
        /* 체크박스 스타일 */
        input[type="checkbox"] { 
            width: 18px; 
            height: 18px; 
            cursor: pointer; 
            accent-color: #3498db;
        }
        
        /* 버튼 영역 */
        .buttons { display: flex; gap: 10px; }
        button { 
            flex: 1; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            transition: all 0.2s ease; 
        }
        button:active { transform: scale(0.98); }
        .btn-generate { background: #3498db; color: white; }
        .btn-generate:hover { background: #2980b9; }
        .btn-copy { background: #2ecc71; color: white; }
        .btn-copy:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div class="container">
        <h2>비밀번호 생성기</h2>
        
        <div class="result-box">
            <div id="passwordDisplay">여기에 생성됩니다</div>
        </div>

        <div class="options">
            <div class="option-group" style="display: block;">
                <div style="display: flex; justify-content: space-between;">
                    <label>비밀번호 길이</label>
                    <span class="length-val" id="lengthVal">12</span>
                </div>
                <input type="range" id="lengthSlider" min="8" max="32" value="12">
            </div>
            
            <div class="option-group">
                <label for="incUpper">대문자 포함 (A-Z)</label>
                <input type="checkbox" id="incUpper" checked>
            </div>
            <div class="option-group">
                <label for="incLower">소문자 포함 (a-z)</label>
                <input type="checkbox" id="incLower" checked>
            </div>
            <div class="option-group">
                <label for="incNumbers">숫자 포함 (0-9)</label>
                <input type="checkbox" id="incNumbers" checked>
            </div>
            <div class="option-group">
                <label for="incSymbols">특수문자 포함 (!@#$%^&*)</label>
                <input type="checkbox" id="incSymbols" checked>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-generate" onclick="generatePassword()">새로 생성</button>
            <button class="btn-copy" onclick="copyPassword()">복사하기</button>
        </div>
    </div>

    <script>
        // HTML의 요소들을 자바스크립트로 가져오기
        const passwordDisplay = document.getElementById('passwordDisplay');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const incUpper = document.getElementById('incUpper');
        const incLower = document.getElementById('incLower');
        const incNumbers = document.getElementById('incNumbers');
        const incSymbols = document.getElementById('incSymbols');

        // 비밀번호를 구성할 문자 세트
        const upperLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowerLetters = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

        // 슬라이더를 움직일 때마다 화면에 길이 숫자(8~32) 업데이트
        lengthSlider.addEventListener('input', function() {
            lengthVal.innerText = lengthSlider.value;
            generatePassword(); // 길이를 조절할 때도 즉시 새 비밀번호 생성
        });

        // 체크박스 상태가 변할 때도 즉시 새 비밀번호 생성
        incUpper.addEventListener('change', generatePassword);
        incLower.addEventListener('change', generatePassword);
        incNumbers.addEventListener('change', generatePassword);
        incSymbols.addEventListener('change', generatePassword);

        // 핵심 기능: 비밀번호 생성 함수
        function generatePassword() {
            let charPool = '';
            let generatedPassword = '';
            const length = lengthSlider.value;

            // 체크된 박스에 따라 사용할 문자들을 charPool에 합침
            if (incUpper.checked) charPool += upperLetters;
            if (incLower.checked) charPool += lowerLetters;
            if (incNumbers.checked) charPool += numbers;
            if (incSymbols.checked) charPool += symbols;

            // 체크박스를 모두 해제했을 때의 방어 로직
            if (charPool === '') {
                passwordDisplay.innerText = '옵션을 하나 이상 선택하세요!';
                passwordDisplay.style.color = '#e74c3c';
                return;
            }

            passwordDisplay.style.color = '#0f172a'; // 에러 메시지가 떴었다면 색상 원상복구

            // 설정한 길이만큼 charPool에서 무작위로 글자를 하나씩 뽑아서 합침
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charPool.length);
                generatedPassword += charPool[randomIndex];
            }

            passwordDisplay.innerText = generatedPassword;
        }

        // 복사하기 함수
        function copyPassword() {
            const text = passwordDisplay.innerText;
            
            // 유효하지 않은 텍스트 복사 방지
            if (text === '옵션을 하나 이상 선택하세요!') {
                alert('유효한 비밀번호를 생성해주세요.');
                return;
            }

            // 클립보드 API를 사용해 복사
            navigator.clipboard.writeText(text).then(() => {
                alert('비밀번호가 클립보드에 복사되었습니다!');
            }).catch(err => {
                alert('복사에 실패했습니다: ' + err);
            });
        }

        // 페이지가 처음 로드될 때 자동으로 한 번 생성해두기
        generatePassword();
    </script>

</body>
</html>
