<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 대한민국 표준 만 나이 계산기</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 480px; }
        .nav a { flex: 1; text-align: center; padding: 12px; background: #cbd5e1; color: #334155; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .nav a.active { background: #ec4899; color: white; box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2); }
        .wrapper { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); box-sizing: border-box; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 25px; font-size: 22px; }
        .calc-card { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; border-left: 5px solid #ec4899; }
        .input-group { display: flex; flex-direction: column; gap: 14px; margin-bottom: 15px; }
        .input-item { display: flex; flex-direction: column; gap: 6px; }
        .date-split-container { display: flex; gap: 6px; align-items: center; }
        .date-split-container input { flex: 1; padding: 11px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; text-align: center; outline: none; }
        .date-split-container input:focus { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1); }
        label { font-size: 14px; color: #475569; font-weight: 600; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .result-box { background: white; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; min-height: 50px; display: flex; flex-direction: column; justify-content: center; }
        .age-huge { font-size: 32px; font-weight: 800; color: #db2777; }
        .sub-info { font-size: 13px; color: #64748b; margin-top: 6px; }
    </style>
</head>
<body>

<div class="nav">
    <a href="dday_age1.html">🎯 디데이</a>
    <a href="dday_age2.html" class="active">🎂 만 나이</a>
    <a href="dday_age3.html">🪖 전역일</a>
</div>

<div class="wrapper">
    <h2>🎂 표준 만 나이 계산기</h2>
    <div class="calc-card">
        <div class="input-group">
            <div class="input-item">
                <label>생년월일 입력</label>
                <div class="date-split-container">
                    <input type="number" id="birthYear" placeholder="YYYY" oninput="autoTab(this, 4, 'birthMonth')">
                    <span>년</span>
                    <input type="number" id="birthMonth" placeholder="MM" oninput="autoTab(this, 2, 'birthDay')">
                    <span>월</span>
                    <input type="number" id="birthDay" placeholder="DD" oninput="autoTab(this, 2, 'baseYear')">
                    <span>일</span>
                </div>
            </div>
            <div class="input-item">
                <label>기준일 입력</label>
                <div class="date-split-container">
                    <input type="number" id="baseYear" placeholder="YYYY" oninput="autoTab(this, 4, 'baseMonth')">
                    <span>년</span>
                    <input type="number" id="baseMonth" placeholder="MM" oninput="autoTab(this, 2, 'baseDay')">
                    <span>월</span>
                    <input type="number" id="baseDay" placeholder="DD" oninput="autoTab(this, 2, null)">
                    <span>일</span>
                </div>
            </div>
        </div>
        <div class="result-box" id="ageResult">
            <span style="color:#94a3b8;">정확한 생년월일을 입력해 주세요.</span>
        </div>
    </div>
</div>

<script>
    // 오늘 날짜 기준으로 기준일 기본 세팅
    const today = new Date();
    document.getElementById('baseYear').value = today.getFullYear();
    document.getElementById('baseMonth').value = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('baseDay').value = String(today.getDate()).padStart(2, '0');

    function autoTab(input, maxLen, nextId) {
        if (input.value.length > maxLen) {
            input.value = input.value.slice(0, maxLen);
        }
        if (input.value.length === maxLen && nextId) {
            document.getElementById(nextId).focus();
            document.getElementById(nextId).select();
        }
        calcAge();
    }

    function calcAge() {
        const by = document.getElementById('birthYear').value;
        const bm = document.getElementById('birthMonth').value;
        const bd = document.getElementById('birthDay').value;
        
        const uy = document.getElementById('baseYear').value;
        const um = document.getElementById('baseMonth').value;
        const ud = document.getElementById('baseDay').value;
        
        const resultDiv = document.getElementById('ageResult');

        if (!by || !bm || !bd || !uy || !um || !ud) return;

        const birth = new Date(`${by}-${bm}-${bd}`);
        const base = new Date(`${uy}-${um}-${ud}`);

        if (isNaN(birth.getTime()) || isNaN(base.getTime())) {
            resultDiv.innerHTML = `<span style="color:#ef4444;">유효하지 않은 날짜가 있습니다.</span>`;
            return;
        }

        let age = base.getFullYear() - birth.getFullYear();
        const monthDiff = base.getMonth() - birth.getMonth();
        const dayDiff = base.getDate() - birth.getDate();

        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) { age--; }
        if (age < 0) {
            resultDiv.innerHTML = `<span style="color:#ef4444; font-weight:bold;">기준일이 생일보다 빠릅니다!</span>`;
            return;
        }

        const zodiac = ["원숭이(신)", "닭(유)", "개(술)", "돼지(해)", "쥐(자)", "소(축)", "호랑이(인)", "토끼(묘)", "용(진)", "뱀(사)", "말(오)", "양(미)"];
        const myZodiac = zodiac[birth.getFullYear() % 12];

        resultDiv.innerHTML = `
            <span class="age-huge">만 ${age}세</span>
            <div class="sub-info">💡 ${birth.getFullYear()}년생 (${myZodiac}띠) / 생일 <b>${(monthDiff > 0 || (monthDiff === 0 && dayDiff >= 0)) ? '지남' : '안 지남'}</b></div>
        `;
    }
</script>
</body>
</html>
