<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초집중 타이머</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 50px; background: #f0f4f8; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .timer-display { font-size: 80px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        input { padding: 15px; width: 60px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; color: white; background: #ec4899; margin: 5px; }
        /* 알람 울릴 때 스타일 */
        .alert-msg { color: #e11d48; font-size: 24px; font-weight: bold; display: none; margin-top: 20px; }
    </style>
</head>
<body onclick="audio.play(); audio.pause();">
    <div class="box">
        <h1>⏰ 초집중 타이머</h1>
        <div id="display" class="timer-display">00:00</div>
        <input type="number" id="m" placeholder="분">
        <input type="number" id="s" placeholder="초">
        <button onclick="set()">설정</button>
        <br><br>
        <button id="start" onclick="go()">🚀 타이머 시작</button>
        <button id="stop" onclick="stopAlarm()" style="display:none; background:#334155;">🛑 알람 끄기</button>
        <div id="msg" class="alert-msg">🔔 시간 종료! 알람 끄기를 눌러주세요.</div>
    </div>

    <script>
        let time = 0, id;
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        function set() {
            time = (parseInt(document.getElementById('m').value)||0)*60 + (parseInt(document.getElementById('s').value)||0);
            show();
        }

        function show() {
            const m = Math.floor(time/60);
            const s = time%60;
            document.getElementById('display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function go() {
            if (time <= 0) return alert("시간을 설정해주세요!");
            document.getElementById('start').style.display = 'none';
            document.getElementById('stop').style.display = 'inline-block';
            id = setInterval(() => {
                time--;
                show();
                if (time <= 0) {
                    clearInterval(id);
                    audio.play(); // 소리 재생 시작
                    document.getElementById('msg').style.display = 'block'; // 경고창 대신 텍스트 메시지 표시
                }
            }, 1000);
        }

        function stopAlarm() {
            audio.pause(); 
            audio.currentTime = 0; // 소리 초기화
            document.getElementById('msg').style.display = 'none'; // 메시지 숨기기
            document.getElementById('stop').style.display = 'none';
            document.getElementById('start').style.display = 'inline-block';
            time = 0; show();
        }
    </script>
</body>
</html>
