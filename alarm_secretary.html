<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초만능 알림 비서 대시보드</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.1s; /* 깜빡임 효과용 */
        }
        /* 화면이 번쩍거리는 경고 상태 애니메이션 클래스 */
        body.alarm-active {
            animation: blink-bg 0.5s infinite alternate;
        }
        @keyframes blink-bg {
            0% { background-color: #fee2e2; }   /* 부드러운 빨강 */
            100% { background-color: #fef08a; } /* 부드러운 노랑 */
        }

        .wrapper {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
            position: relative;
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 24px;
        }
        /* 알림 중지 긴급 버튼 */
        .stop-banner {
            display: none;
            width: 100%;
            padding: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        .input-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }
        .form-item label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }
        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            background: white;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .add-btn {
            width: 100%;
            padding: 13px;
            background: #3b82f6;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }
        .add-btn:hover { background: #2563eb; }

        .list-section h3 {
            font-size: 16px;
            color: #1e293b;
            margin: 0 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }
        .alert-card {
            background: #fdfdfd;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #64748b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }
        .alert-info h4 { margin: 0 0 4px 0; font-size: 15px; color: #1e293b; }
        .alert-info p { margin: 0; font-size: 13px; color: #64748b; }
        .right-area { display: flex; align-items: center; gap: 10px; }
        .alert-time { font-size: 14px; font-weight: 700; color: #1e293b; background: white; border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 20px; }
        .delete-btn { background: #94a3b8; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .delete-btn:hover { background: #64748b; }

        /* AI 실시간 디버그 박스 */
        #ai-debug-box {
            display: none; margin-top: 25px; padding: 15px; background: #fef2f2; 
            border: 1px dashed #ef4444; color: #991b1b; font-family: monospace; 
            font-size: 12px; border-radius: 10px; text-align: left;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🔔 초만능 알림 비서 대시보드</h2>

    <button id="stopBtn" class="stop-banner" onclick="stopGlobalAlarm()">🚨 알림 소리 끄기 (화면 클릭)</button>

    <div class="input-section">
        <div class="form-item">
            <label>📌 무슨 알림인가요?</label>
            <input type="text" id="alertTitle" placeholder="예: 약 먹기, 낮잠 깨기, 주문 확인">
        </div>
        <div class="form-item">
            <label>📝 상세 메모 (선택)</label>
            <input type="text" id="alertDesc" placeholder="예: 비타민C 복용, 15분만 자기">
        </div>
        <div class="form-item">
            <label>⏰ 알림 시간</label>
            <input type="time" id="alertTime">
        </div>
        <div class="form-item">
            <label>🎵 사이렌 종류</label>
            <select id="alertSound">
                <option value="beep">기본 삐-익 (간결함)</option>
                <option value="siren">🚨 비상 사이렌 위오위오 (강력함)</option>
            </select>
        </div>
        <button class="add-btn" onclick="addCustomAlert()">+ 나만의 알림 등록하기</button>
    </div>

    <div class="list-section">
        <h3>현재 작동 중인 레이더 리스트</h3>
        <div id="alertList"></div>
    </div>

    <div id="ai-debug-box">
        <b>🛠️ AI 진단용 실시간 에러 리포트:</b><br><br>
    </div>
</div>

<script>
    // 일거양득 에러 수집 엔진 탑재
    window.onerror = function (message, source, lineno, colno, error) {
        const dBox = document.getElementById('ai-debug-box');
        if (dBox) {
            dBox.style.display = 'block';
            dBox.innerHTML += `• ${message} (라인: ${lineno}줄)<br>`;
        }
        return false;
    };

    // 브라우저 팝업 권한
    if (Notification.permission !== "granted") { Notification.requestPermission(); }

    // 소리 제어용 오디오 컨텍스트 및 타이머 변수
    let audioCtx = null;
    let soundIntervalId = null;
    let isAlarmPlaying = false;

    // 카테고리를 제외한 심플 데이터 포맷
    let myAlerts = [
        { id: 1, title: "💊 약 먹는 시간", desc: "영양제랑 물 챙겨 드세요.", time: "08:00", sound: "beep", triggered: false },
        { id: 2, title: "😴 낮잠 깨기", desc: "정신 차리고 다시 고고!", time: "13:30", sound: "siren", triggered: false }
    ];

    function renderAlerts() {
        const listDiv = document.getElementById('alertList');
        listDiv.innerHTML = '';

        if(myAlerts.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;'>등록된 알림이 없습니다.</p>";
            return;
        }

        myAlerts.forEach(item => {
            listDiv.innerHTML += `
                <div class="alert-card">
                    <div class="alert-info">
                        <h4>${item.title}</h4>
                        <p>${item.desc}</p>
                    </div>
                    <div class="right-area">
                        <span class="alert-time">${item.time}</span>
                        <button class="delete-btn" onclick="deleteAlert(${item.id})">삭제</button>
                    </div>
                </div>
            `;
        });
    }

    function addCustomAlert() {
        const title = document.getElementById('alertTitle').value;
        const desc = document.getElementById('alertDesc').value;
        const time = document.getElementById('alertTime').value;
        const sound = document.getElementById('alertSound').value;

        if(!title || !time) {
            alert("📌 무슨 알림인지 이름과 시간은 꼭 써주셔야 합니다!");
            return;
        }

        myAlerts.push({
            id: Date.now(),
            title: title,
            desc: desc || "지정된 일과 시간입니다.",
            time: time,
            sound: sound,
            triggered: false
        });

        renderAlerts();
        document.getElementById('alertTitle').value = '';
        document.getElementById('alertDesc').value = '';
    }

    function deleteAlert(id) {
        myAlerts = myAlerts.filter(item => item.id !== id);
        renderAlerts();
    }

    // 🎵 인터넷 없이도 무조건 뿜어져 나오는 내장 비프음 발생기
    function startNativeSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isAlarmPlaying = true;
        
        document.getElementById('stopBtn').style.display = 'block';
        document.body.classList.add('alarm-active');

        if (type === 'beep') {
            soundIntervalId = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 800; gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }, 400);
        } else { // 사이렌 주파수 변조 방식
            let toggle = false;
            soundIntervalId = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = toggle ? 900 : 600;
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                toggle = !toggle;
            }, 300);
        }
    }

    // 🚨 알림 수동 중지 버튼 함수
    function stopGlobalAlarm() {
        if (soundIntervalId) {
            clearInterval(soundIntervalId);
            soundIntervalId = null;
        }
        isAlarmPlaying = false;
        document.getElementById('stopBtn').style.display = 'none';
        document.body.classList.remove('alarm-active');
    }

    // 1초 점검 루프
    setInterval(() => {
        const now = new Date();
        const currentSystemTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        myAlerts.forEach(item => {
            if (item.time === currentSystemTime) {
                if (!item.triggered && !isAlarmPlaying) {
                    // 소리 재생 및 시각 효과 가동
                    startNativeSound(item.sound);

                    // 바탕화면 윈도우 기본 푸시 팝업
                    if (Notification.permission === "granted") {
                        new Notification(`🔔 알림: ${item.title}`, { body: item.desc });
                    }
                    item.triggered = true;
                }
            } else {
                item.triggered = false; // 시간이 지나면 내일 다시 울리도록 리셋
            }
        });
    }, 1000);

    renderAlerts();
</script>

</body>
</html>
