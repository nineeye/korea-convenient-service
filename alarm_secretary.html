<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 알림 사이트 | 무료 반복 알람 프로그램 대시보드</title>
    <meta name="description" content="별도 설치 없는 무료 온라인 알림 사이트입니다. 일과 관리, 약 먹는 시간, 업무 체크를 위한 간편한 반복 알람 시계 기능을 이용해 보세요.">
    <meta name="keywords" content="온라인 알림, 알림사이트, 반복알람사이트, 알람사이트, 알람 설정, 무료 알람">
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.1s;
        }
        body.alarm-active {
            animation: blink-bg 0.5s infinite alternate;
        }
        @keyframes blink-bg {
            0% { background-color: #fee2e2; }
            100% { background-color: #fef08a; }
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }
        
        /* SEO 최적화 및 키워드 녹여낸 타이틀 섹션 */
        .seo-title-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .seo-title-area h1 {
            color: #0f172a;
            font-size: 24px;
            margin: 0 0 6px 0;
            font-weight: 800;
        }
        .seo-title-area p {
            color: #64748b;
            font-size: 13px;
            margin: 0;
            font-weight: 500;
        }

        .stop-banner {
            display: none;
            width: 100%;
            padding: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        .input-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }
        .form-item label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }
        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            background: white;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .add-btn {
            width: 100%;
            padding: 13px;
            background: #3b82f6;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }
        .add-btn:hover { background: #2563eb; }

        .list-section h3 {
            font-size: 16px;
            color: #1e293b;
            margin: 0 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }
        .alert-card {
            background: #fdfdfd;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }
        .alert-info h4 { margin: 0; font-size: 16px; color: #1e293b; font-weight: 600; }
        .right-area { display: flex; align-items: center; gap: 8px; }
        .alert-time { font-size: 14px; font-weight: 700; color: #1e293b; background: white; border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 20px; margin-right: 4px; }
        .btn-action { color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .edit-btn { background: #0ea5e9; }
        .edit-btn:hover { background: #0284c7; }
        .delete-btn { background: #94a3b8; }
        .delete-btn:hover { background: #64748b; }

        #ai-debug-box {
            display: none; margin-top: 25px; padding: 15px; background: #fef2f2; 
            border: 1px dashed #ef4444; color: #991b1b; font-family: monospace; 
            font-size: 12px; border-radius: 10px; text-align: left;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="seo-title-area">
        <h1>⏰ 온라인 알림 사이트</h1>
        <p>간편한 일과 통제를 위한 초만능 반복알람사이트</p>
    </div>

    <button id="stopBtn" class="stop-banner" onclick="stopGlobalAlarm()">🚨 알림 소리 끄기 (화면 클릭)</button>

    <div class="input-section">
        <input type="hidden" id="editId" value="">
        <div class="form-item">
            <label>📌 무슨 알림인가요?</label>
            <input type="text" id="alertTitle" placeholder="예: 약 먹는 시간, 낮잠 깨기, 주문 수집">
        </div>
        <div class="form-item">
            <label>⏰ 알림 설정 시간</label>
            <input type="time" id="alertTime">
        </div>
        <div class="form-item">
            <label>🎵 사이렌 종류</label>
            <select id="alertSound">
                <option value="beep">기본 삐-익 (간결함)</option>
                <option value="siren">🚨 비상 사이렌 위오위오 (강력함)</option>
            </select>
        </div>
        <button id="submitBtn" class="add-btn" onclick="handleSubmitAlert()">+ 나만의 알림 등록하기</button>
    </div>

    <div class="list-section">
        <h3>현재 작동 중인 레이더 리스트</h3>
        <div id="alertList"></div>
    </div>

    <div id="ai-debug-box">
        <b>🛠️ AI 진단용 실시간 에러 리포트:</b><br><br>
    </div>
</div>

<script>
    window.onerror = function (message, source, lineno, colno, error) {
        const dBox = document.getElementById('ai-debug-box');
        if (dBox) {
            dBox.style.display = 'block';
            dBox.innerHTML += `• ${message} (라인: ${lineno}줄)<br>`;
        }
        return false;
    };

    if (Notification.permission !== "granted") { Notification.requestPermission(); }

    let audioCtx = null;
    let soundIntervalId = null;
    let isAlarmPlaying = false;

    // 초기 샘플 일체화
    let myAlerts = [
        { id: 1, title: "💊 약 먹는 시간", time: "08:00", sound: "beep", triggered: false },
        { id: 2, title: "📦 스마트스토어 주문 수집", time: "10:00", sound: "siren", triggered: false }
    ];

    function renderAlerts() {
        const listDiv = document.getElementById('alertList');
        listDiv.innerHTML = '';

        if(myAlerts.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;'>등록된 알림 스케줄이 없습니다.</p>";
            return;
        }

        myAlerts.forEach(item => {
            listDiv.innerHTML += `
                <div class="alert-card">
                    <div class="alert-info">
                        <h4>${item.title}</h4>
                    </div>
                    <div class="right-area">
                        <span class="alert-time">${item.time}</span>
                        <button class="btn-action edit-btn" onclick="startEditAlert(${item.id})">수정</button>
                        <button class="btn-action delete-btn" onclick="deleteAlert(${item.id})">삭제</button>
                    </div>
                </div>
            `;
        });
    }

    function handleSubmitAlert() {
        const title = document.getElementById('alertTitle').value;
        const time = document.getElementById('alertTime').value;
        const sound = document.getElementById('alertSound').value;
        const editId = document.getElementById('editId').value;

        if(!title || !time) {
            alert("📌 무슨 알림인지 명칭과 시간은 꼭 지정해 주셔야 합니다!");
            return;
        }

        if (editId) {
            // 수정 로직 작동
            myAlerts = myAlerts.map(item => {
                if (item.id === parseInt(editId)) {
                    return { ...item, title: title, time: time, sound: sound, triggered: false };
                }
                return item;
            });
            document.getElementById('submitBtn').innerText = "+ 나만의 알림 등록하기";
            document.getElementById('editId').value = "";
        } else {
            // 신규 추가 로직
            myAlerts.push({
                id: Date.now(),
                title: title,
                time: time,
                sound: sound,
                triggered: false
            });
        }

        renderAlerts();
        document.getElementById('alertTitle').value = '';
    }

    function startEditAlert(id) {
        const target = myAlerts.find(item => item.id === id);
        if (target) {
            document.getElementById('alertTitle').value = target.title;
            document.getElementById('alertTime').value = target.time;
            document.getElementById('alertSound').value = target.sound;
            document.getElementById('editId').value = target.id;
            document.getElementById('submitBtn').innerText = "💾 알림 내용 수정 완료";
            document.getElementById('alertTitle').focus();
        }
    }

    function deleteAlert(id) {
        myAlerts = myAlerts.filter(item => item.id !== id);
        renderAlerts();
    }

    function startNativeSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isAlarmPlaying = true;
        
        document.getElementById('stopBtn').style.display = 'block';
        document.body.classList.add('alarm-active');

        if (type === 'beep') {
            soundIntervalId = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 800; gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }, 400);
        } else {
            let toggle = false;
            soundIntervalId = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = toggle ? 900 : 600;
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                toggle = !toggle;
            }, 300);
        }
    }

    // 전역 알림 중지 핸들러
    function stopGlobalAlarm() {
        if (soundIntervalId) {
            clearInterval(soundIntervalId);
            soundIntervalId = null;
        }
        isAlarmPlaying = false;
        document.getElementById('stopBtn').style.display = 'none';
        document.body.classList.remove('alarm-active');
    }

    setInterval(() => {
        const now = new Date();
        const currentSystemTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        myAlerts.forEach(item => {
            if (item.time === currentSystemTime) {
                if (!item.triggered && !isAlarmPlaying) {
                    startNativeSound(item.sound);
                    if (Notification.permission === "granted") {
                        new Notification(`🔔 온라인 알림: ${item.title}`);
                    }
                    item.triggered = true;
                }
            } else {
                item.triggered = false;
            }
        });
    }, 1000);

    renderAlerts();
</script>

</body>
</html>
