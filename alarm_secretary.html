<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만능 알림 타이머 비서 | 웹 뽀모도로 타이머</title>
    <meta name="description" content="업무 집중력을 극대화하는 온라인 타이머 및 정밀한 알림 비서 도구입니다.">
    <meta name="keywords" content="온라인타이머, 웹타이머, 알림비서, 뽀모도로타이머, 시간알림">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            justify-content: center;
        }
        
        /* 단독 페이지용 홈 이동 링크 버튼 */
        .home-link {
            margin-bottom: 20px;
        }
        .home-link a {
            padding: 10px 20px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            transition: background 0.2s;
        }
        .home-link a:hover { background: #1e293b; }

        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 500px; 
            box-sizing: border-box;
            text-align: center;
        }
        h2 { color: #0f172a; font-size: 24px; margin: 0 0 6px 0; font-weight: 800; }
        .sub-desc { color: #64748b; font-size: 13px; margin: 0 0 30px 0; }
        
        /* 타이머 디스플레이 상큼한 핑크 테마 적용 */
        .timer-display {
            font-size: 64px;
            font-weight: 900;
            color: #ec4899;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
            background: #fff5f7;
            padding: 25px;
            border-radius: 20px;
            border: 2px dashed #fbcfe8;
            letter-spacing: 2px;
        }
        
        /* 시간 설정 퀵 프리셋 버튼 */
        .preset-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .btn-preset {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-preset:hover { background: #ec4899; color: white; border-color: #ec4899; }
        
        /* 커스텀 시간 입력 영역 */
        .custom-time {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .custom-time input {
            width: 65px;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        .custom-time input:focus { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1); }
        .custom-time span { font-size: 14px; font-weight: 700; color: #475569; }

        /* 메인 제어 버튼 */
        .tool-toolbar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-action { padding: 15px; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-start { background: #ec4899; } .btn-start:hover { background: #db2777; }
        .btn-reset { background: #64748b; } .btn-reset:hover { background: #475569; }
    </style>
</head>
<body>

    <div class="home-link">
        <a href="index.html">🏠 메인 홈으로 이동</a>
    </div>

    <div class="container">
        <h2>⏰ 만능 알림 타이머 비서</h2>
        <p class="sub-desc">설정하신 시간이 완료되면 강력한 브라우저 푸시 알림과 효과음이 울립니다.</p>
        
        <div class="timer-display" id="timeDisplay">00:00</div>
        
        <div class="preset-group">
            <button class="btn-preset" onclick="setPreset(10)">⏱️ 10초 테스트</button>
            <button class="btn-preset" onclick="setPreset(300)">⏳ 5분 휴식</button>
            <button class="btn-preset" onclick="setPreset(1500)">🔥 25분 집중</button>
            <button class="btn-preset" onclick="setPreset(3000)">💻 50분 업무</button>
        </div>

        <div class="custom-time">
            <input type="number" id="inputMin" min="0" max="99" value="0">
            <span>분</span>
            <input type="number" id="inputSec" min="0" max="59" value="0">
            <span>초</span>
            <button class="btn-preset" style="background: #0f172a; color: white;" onclick="setCustomTime()">설정 적용</button>
        </div>
        
        <div class="tool-toolbar">
            <button class="btn-action btn-start" id="btnStart" onclick="toggleTimer()">🚀 타이머 시작</button>
            <button class="btn-action btn-reset" onclick="resetTimer()">🔄 타이머 초기화</button>
        </div>
    </div>

    <audio id="alarmAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" preload="auto"></audio>

    <script>
        let timerId = null;
        let timeLeft = 0; 
        let isRunning = false;

        const timeDisplay = document.getElementById('timeDisplay');
        const btnStart = document.getElementById('btnStart');
        const alarmAudio = document.getElementById('alarmAudio');

        // 페이지 진입 시 푸시 알림 권한 동의 요청
        window.onload = function() {
            if (window.Notification && Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        };

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.innerText = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function setPreset(seconds) {
            if (isRunning) resetTimer();
            timeLeft = seconds;
            updateDisplay();
        }

        function setCustomTime() {
            if (isRunning) resetTimer();
            const min = parseInt(document.getElementById('inputMin').value) || 0;
            const sec = parseInt(document.getElementById('inputSec').value) || 0;
            timeLeft = (min * 60) + sec;
            updateDisplay();
        }

        function toggleTimer() {
            if (timeLeft <= 0) {
                alert('📌 타이머 작동을 위해 시간을 먼저 설정해 주세요!');
                return;
            }

            if (!isRunning) {
                isRunning = true;
                btnStart.innerText = "⏸️ 타이머 일시정지";
                btnStart.style.background = "#e11d48";
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        triggerAlarm();
                        resetTimer();
                    }
                }, 1000);
            } else {
                isRunning = false;
                btnStart.innerText = "🚀 타이머 다시 시작";
                btnStart.style.background = "#ec4899";
                clearInterval(timerId);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 0;
            isRunning = false;
            btnStart.innerText = "🚀 타이머 시작";
            btnStart.style.background = "#ec4899";
            updateDisplay();
        }

        function triggerAlarm() {
            // 효과음 재생
            alarmAudio.play().catch(e => console.log("오디오 재생 제한"));
            
            // 시스템 푸시 알림 제공
            if (window.Notification && Notification.permission === "granted") {
                new Notification("⏰ 만능 알림 비서 알림 ⏰", {
                    body: "설정하신 집중/휴식 시간이 종료되었습니다!",
                    icon: "https://cdn-icons-png.flaticon.com/512/2693/2693507.png"
                });
            } else {
                alert("🎉 설정하신 시간이 모두 완료되었습니다!");
            }
        }
    </script>
</body>
</html>
