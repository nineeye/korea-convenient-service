<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>짧은 타이머</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⏰ 짧은 타이머</h1>
        <div id="display" style="font-size:50px;">00:00</div>
        <input type="number" id="m" placeholder="분" style="width:50px;">
        <input type="number" id="s" placeholder="초" style="width:50px;">
        <button onclick="set()">설정</button>
        <br><br>
        <button id="start" onclick="go()">🚀 시작</button>
        <button id="stop" onclick="location.reload()" style="display:none;">🛑 멈춤/초기화</button>
    </div>
    <script>
        let time = 0, id;
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"); // 소리 객체 생성
        function set() { time = (parseInt(document.getElementById('m').value)||0)*60 + (parseInt(document.getElementById('s').value)||0); show(); }
        function show() { document.getElementById('display').innerText = `${Math.floor(time/60)}`.padStart(2,'0') + ":" + `${time%60}`.padStart(2,'0'); }
        function go() { 
            document.getElementById('start').style.display='none'; document.getElementById('stop').style.display='inline';
            id = setInterval(() => { 
                time--; show(); 
                if(time<=0) { 
                    clearInterval(id); 
                    audio.play(); // 소리 재생
                    alert('완료!'); 
                } 
            }, 1000); 
        }
    </script>
</body>
</html>
