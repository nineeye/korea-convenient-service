<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>말투 변환기 | 텍스트 마스터</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav a { padding: 10px 15px; background: #ddd; color: #333; text-decoration: none; border-radius: 6px; }
        .nav a.active { background: #3498db; color: white; }
        textarea { width: 100%; height: 200px; margin: 15px 0; }
        .stats { display: flex; justify-content: space-around; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav" style="display: flex; gap: 5px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
    <a href="bigsmalltextchange1.html" style="padding: 10px; background: #ddd; text-decoration: none; border-radius: 5px;">글자수</a>
    <a href="bigsmalltextchange2.html" style="padding: 10px; background: #ddd; text-decoration: none; border-radius: 5px;">대소문자</a>
    <a href="bigsmalltextchange3.html" style="padding: 10px; background: #ddd; text-decoration: none; border-radius: 5px;">맞춤법</a>
    <a href="bigsmalltextchange4.html" style="padding: 10px; background: #9b59b6; color: white; text-decoration: none; border-radius: 5px;">말투변환</a>
</div>
<div class="container">
    <h2>재미있는 말투 변환기</h2>
    <textarea id="textInput" placeholder="여기에 변환할 문장을 입력하세요..."></textarea>
    
    <div class="btn-group">
        <button style="background: #e67e22;" onclick="convert('grandma')">👵 할머니</button>
        <button style="background: #f1c40f;" onclick="convert('tsundere')">츤데레</button>
        <button style="background: #34495e;" onclick="convert('business')">💼 비즈니스</button>
        <button style="background: #7f8c8d;" onclick="convert('ajae')">👴 아재</button>
        <button style="background: #2c3e50;" onclick="convert('soldier')">🪖 군인</button>
        <button style="background: #e91e63;" onclick="convert('mz')">📱 MZ세대</button>
        <button style="background: #9c27b0;" onclick="convert('chuuni')">👿 중2병</button>
        <button style="background: #d35400;" onclick="convert('sageuk')">👑 사극</button>
        <button style="background: #27ae60;" onclick="convert('robot')">🤖 로봇</button>
        <button style="background: #3498db;" onclick="convert('baby')">👶 아기</button>
    </div>
</div>

<script>
    function convert(tone) {
        let text = document.getElementById('textInput').value;
        if (!text) return;
        switch(tone) {
            case 'grandma': text = "허허, " + text.replace(/다\./g, '란다.').replace(/해요/g, '하누나'); break;
            case 'tsundere': text = text.replace(/다\./g, '야, 알겠어? ') + " ...딱히 너 주려고 한 건 아냐!"; break;
            case 'business': text = "안녕하십니까, " + text.replace(/다\./g, '바랍니다.'); break;
            case 'ajae': text = text.replace(/다\./g, '구먼, 껄껄!').replace(/해요/g, '하지 뭐'); break;
            case 'soldier': text = text.replace(/다\./g, '말입니다.').replace(/요/g, '입니까?'); break;
            case 'mz': text = text.replace(/다\./g, '임ㅋㅋ').replace(/해요/g, '함!').replace(/진짜/g, '개'); break;
            case 'chuuni': text = "흐흐.. " + text.replace(/다\./g, '한다.. 큭큭..').replace(/해요/g, '할뿐이지..'); break;
            case 'sageuk': text = text.replace(/다\./g, '하오니,').replace(/해요/g, '하옵나이다.'); break;
            case 'robot': text = "[SYSTEM] " + text.replace(/다\./g, '완료되었습니다.'); break;
            case 'baby': text = text.replace(/다\./g, '쪄요~').replace(/해요/g, '해쪄요!'); break;
        }
        document.getElementById('textInput').value = text;
    }
</script>

</body>
</html>
