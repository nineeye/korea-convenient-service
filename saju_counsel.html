<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizShot AI - 나의 숨겨진 재물운 찾기</title>
    <style>
        /* 밝고 다정다감한 웜톤 기반의 디자인 */
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #FFF9F4; /* 따뜻하고 부드러운 살구색 배경 */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(255, 138, 101, 0.15); /* 코랄빛 그림자 */
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #FF7043; /* 다정하고 활기찬 코랄 오렌지 */
            margin-bottom: 5px;
            font-size: 1.6em;
        }
        p.subtitle {
            text-align: center;
            color: #8D6E63; /* 부드러운 브라운 톤 */
            font-size: 0.95em;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 0.9em;
            color: #6D4C41;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #FFE0B2;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1em;
            background-color: #FFFCFA;
            color: #4E342E;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #FF8A65;
        }
        button.submit-btn {
            width: 100%;
            background-color: #FF8A65; /* 따뜻한 메인 버튼 */
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.15em;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s, transform 0.1s;
        }
        button.submit-btn:hover {
            background-color: #FF7043;
            transform: translateY(-2px);
        }
        
        /* 결과창 스타일 */
        #result-section {
            display: none;
            margin-top: 20px;
            padding: 25px 20px;
            background-color: #FFF3E0; /* 포근한 결과창 배경 */
            border-radius: 16px;
            border-top: 5px solid #FFB74D;
        }
        .result-title {
            margin-top: 0;
            color: #E65100;
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 15px;
        }
        .result-text {
            font-size: 1em;
            line-height: 1.7;
            color: #4E342E;
        }
        .slogan {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #FFCC80;
            font-size: 0.9em;
            font-weight: bold;
            color: #8D6E63;
            text-align: center;
            line-height: 1.6;
        }
        .action-btn {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #4CAF50; /* 편안하고 건강한 느낌의 그린 (구매 전환 유도) */
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }
        .action-btn:hover {
            background-color: #43A047;
        }
        .row-group {
            display: flex;
            gap: 10px;
        }
        .row-group .form-group {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍀 나의 숨겨진 재물운</h2>
    <p class="subtitle">BizShot AI가 당신의 금전 흐름을 읽어드립니다</p>

    <div id="input-section">
        <div class="row-group">
            <div class="form-group">
                <label for="user-name">이름 (애칭)</label>
                <input type="text" id="user-name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="user-gender">성별</label>
                <select id="user-gender">
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                </select>
            </div>
        </div>
        
        <div class="row-group">
            <div class="form-group">
                <label for="birth-year">태어난 연도</label>
                <input type="number" id="birth-year" placeholder="1990" required>
            </div>
            <div class="form-group">
                <label for="birth-month">월</label>
                <select id="birth-month">
                    <option value="1">1월</option><option value="2">2월</option>
                    <option value="3">3월</option><option value="4">4월</option>
                    <option value="5">5월</option><option value="6">6월</option>
                    <option value="7">7월</option><option value="8">8월</option>
                    <option value="9">9월</option><option value="10">10월</option>
                    <option value="11">11월</option><option value="12">12월</option>
                </select>
            </div>
            <div class="form-group">
                <label for="birth-day">일</label>
                <input type="number" id="birth-day" placeholder="15" required>
            </div>
        </div>
        <button class="submit-btn" onclick="showResult()">내 재물운 확인하기 ✨</button>
    </div>

    <div id="result-section">
        <h3 class="result-title" id="result-greeting">✨ 분석 결과</h3>
        <div class="result-text" id="ai-response">
            </div>
        
        <div class="slogan">
            운이란 단순히 타고나는 것이 아니라,<br>당신이 노력하고 변하기만 한다면<br>그 길로 한층 더 가깝게 다가갈 수 있습니다.<br>당신의 그 걸음을 응원합니다.
        </div>

        <a href="#" class="action-btn">내 에너지를 채우는 습관 만들기 🎁</a>
    </div>
</div>

<script>
    function showResult() {
        const name = document.getElementById('user-name').value || '고객';
        const year = document.getElementById('birth-year').value;
        const month = document.getElementById('birth-month').value;
        
        if(!year) {
            alert('태어난 연도를 입력해주세요!');
            return;
        }

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        
        // 이름을 넣어서 친근하게 인사
        document.getElementById('result-greeting').innerHTML = `✨ ${name}님의 재물운 흐름`;

        let fortuneText = "";
        if (month % 3 === 0) {
            fortuneText = `<strong>${name}님</strong>은 본래 재물을 끌어당기는 자력이 강한 사주입니다. 하지만 그 에너지가 가끔 흩어지는 경향이 있네요. <strong>'선택과 집중'</strong>이 올해 ${name}님의 지갑을 두껍게 만들어줄 핵심 키워드입니다. 주변의 정보에 흔들리지 말고 본인의 직감을 믿어보세요!`;
        } else if (month % 2 === 0) {
            fortuneText = `차곡차곡 쌓아올리는 대기만성형 재물운을 가지고 계시군요! 한방을 노리기보다는 꾸준한 자기 관리와 투자가 결국 큰 빛을 발하게 됩니다. 지금 당장 눈앞의 이익보다 <strong>${name}님 자신의 가치(체력, 지식)</strong>를 높이는 데 투자하세요.`;
        } else {
            fortuneText = `사람이 곧 재물인 사주입니다! <strong>${name}님</strong>의 재물운은 사람과의 관계에서 크게 열립니다. 평소 연락하지 않던 지인에게 안부를 묻거나, 새로운 모임에 나가는 것이 생각지도 못한 금전적 기회로 연결될 수 있습니다. <strong>긍정적인 에너지</strong>를 유지하는 것이 돈을 부르는 비결입니다.`;
        }

        document.getElementById('ai-response').innerHTML = fortuneText;
    }
</script>

</body>
</html>
